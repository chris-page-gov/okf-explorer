name: Publish GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/okf-explorer/pnpm-lock.yaml

      - name: Install OKF Explorer dependencies
        working-directory: apps/okf-explorer
        run: pnpm install --frozen-lockfile

      - name: Validate Svelte OKF Explorer
        working-directory: apps/okf-explorer
        run: pnpm check

      - name: Build Svelte OKF Explorer
        working-directory: apps/okf-explorer
        run: pnpm build

      - name: Validate OKF bundle
        run: python3 scripts/check_okf.py

      - name: Validate OKF Explorer bundle
        run: python3 scripts/build_okf_bundle.py --check

      - name: Build static site
        run: python3 scripts/build_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
