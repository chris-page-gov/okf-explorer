name: OKF Explorer CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  okf-explorer-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/okf-explorer/pnpm-lock.yaml

      - name: Install OKF Explorer dependencies
        working-directory: apps/okf-explorer
        run: pnpm install --frozen-lockfile

      - name: Validate Svelte OKF Explorer
        working-directory: apps/okf-explorer
        run: pnpm check

      - name: Run OKF Explorer tests
        working-directory: apps/okf-explorer
        run: pnpm test

      - name: Build Svelte OKF Explorer
        working-directory: apps/okf-explorer
        run: pnpm build

      - name: Run geospatial Map browser tests
        working-directory: apps/okf-explorer
        run: pnpm test:e2e

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install semantic OKF dependencies
        run: python3 -m pip install -r requirements-okf.txt

      - name: Run OKF generator tests
        run: python3 -m unittest discover -s tests

      - name: Validate YAML-LD registry and constraint ledger
        run: |
          python3 scripts/build_okf_registry.py --check
          python3 scripts/check_source_constraints.py

      - name: Generate UK Government API corpus from fixtures
        run: |
          python3 scripts/build_uk_government_api_okf.py \
            --source tests/fixtures/uk_government_api_okf/api_catalogue.csv \
            --ckan-fixture tests/fixtures/uk_government_api_okf/ckan_package_search.json \
            --os-fixture tests/fixtures/uk_government_api_okf/os_api_tree.json \
            --ons-fixture tests/fixtures/uk_government_api_okf/ons_payload.json \
            --output "$RUNNER_TEMP/uk-government-apis-ci"

      - name: Generate legislation corpus from fixtures
        run: |
          python3 scripts/build_legislation_okf.py \
            --fixture tests/fixtures/legislation_okf/sample.feed.xml \
            --output "$RUNNER_TEMP/legislation-ci" \
            --generated-at "2026-07-10T00:00:00Z"

      - name: Regenerate legislation answer evaluation
        run: |
          python3 scripts/build_legislation_evaluation.py
          git diff --exit-code -- evaluation/legislation/questions.json

      - name: Validate published legislation corpus
        run: python3 scripts/check_legislation_okf.py

      - name: Check documentation lockstep
        if: github.event_name == 'pull_request'
        run: python3 scripts/check_documentation_lockstep.py --base "origin/${{ github.base_ref }}...HEAD"

      - name: Validate OKF bundle
        run: python3 scripts/build_okf_bundle.py --check

      - name: Validate legacy OKF viewer
        run: python3 scripts/update_viewer.py --check

      - name: Check OKF conformance
        run: python3 scripts/check_okf.py

      - name: Build static site
        run: python3 scripts/build_site.py
