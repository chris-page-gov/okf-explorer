name: OKF Explorer CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  okf-explorer-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/okf-explorer/pnpm-lock.yaml

      - name: Install OKF Explorer dependencies
        working-directory: apps/okf-explorer
        run: pnpm install --frozen-lockfile

      - name: Validate Svelte OKF Explorer
        working-directory: apps/okf-explorer
        run: pnpm check

      - name: Run OKF Explorer tests
        working-directory: apps/okf-explorer
        run: pnpm test

      - name: Build Svelte OKF Explorer
        working-directory: apps/okf-explorer
        run: pnpm build

      - name: Validate OKF bundle
        run: python3 scripts/build_okf_bundle.py --check

      - name: Validate legacy OKF viewer
        run: python3 scripts/update_viewer.py --check

      - name: Check OKF conformance
        run: python3 scripts/check_okf.py

      - name: Build static site
        run: python3 scripts/build_site.py
