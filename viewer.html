<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ai-infrastructure-wiki — OKF viewer</title><style>

canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
.bar{position:absolute;top:10px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:9;background:rgba(15,19,32,.8);padding:4px;border-radius:9px;border:1px solid var(--line);max-width:94%;flex-wrap:wrap;align-items:center}
.bar button{background:transparent;color:var(--mut);border:0;border-radius:6px;height:28px;padding:0 11px;font-size:12.5px;cursor:pointer}

#side{position:absolute;top:0;left:0;bottom:0;width:272px;max-width:82%;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;transform:translateX(-101%);transition:transform .2s ease;z-index:20;box-shadow:2px 0 16px rgba(0,0,0,.3)}

#dclose{position:absolute;top:10px;right:12px;background:var(--panel2);border:1px solid var(--line);color:var(--tx);border-radius:6px;width:26px;height:26px;cursor:pointer;font-size:14px}

#tip b{font-size:12.5px}#tip .m{color:var(--mut)}#tip .ty{color:var(--acc);font-size:11px}#tip .ar{color:#bfe0ff}

const G={"nodes":{"document/index.md":{"type":"Index","title":"The reviewed sources","description":"Overview, source documents, themes and the evaluation.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"# The reviewed sources\n\nOverview, source documents, themes and the evaluation.\n\n- **[Source documents/](sources/index.md)**\n- **[Themes/](themes/index.md)**\n- [AI infrastructure — overview](overview.md) — Two complementary threads: the agent-ready vertical stack and the federated collaborative-learning layer.\n- [Evaluation & provenance note](peer-review.md) — How this bundle was built and what is verified vs open."},"document/overview.md":{"type":"Document","title":"AI infrastructure — overview","description":"Two complementary threads: the agent-ready vertical stack and the federated collaborative-learning layer.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"# What this bundle covers\nThe **AI infrastructure** realm has two complementary threads. The **[agent-ready vertical stack](../stack/control-plane.md)** turns a tool-calling model into governed execution (contracts, discovery, identity, execution, policy, observability/provenance). The **[federation layer](../stack/federation-layer.md)** is the horizontal *collaborative-learning* plane that lets institutions improve shared models without centralising data.\n\nThe through-line: *API-calling is only one layer of an agent-capable stack*, and most stacks are also **missing a collaborative-learning layer**. Both gaps are infrastructural and organisational, not model-quality problems.\n\n# Sources\nDrawn from [From API-Calling LLMs to Agent-Ready Digital Infrastructure](sources/agent-ready-infrastructure-paper.md), the [Federated AI Research Execution Report](sources/federated-ai-report.md), and the [Engineering Agent-Ready Infrastructure deck](sources/engineering-deck.md). See [Sources index](../sources-index.md).\n\n# Terms\nGlossary terms used here: [Provenance](../glossary/provenance.md)."},"document/peer-review.md":{"type":"Evaluation","title":"Evaluation & provenance note","description":"How this bundle was built and what is verified vs open.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"# Verdict\nBuilt from two strong, well-sourced reports. The agent-ready thread's technical claims are grounded in primary standards and major papers (arXiv, RFCs, spec sites); the federated thread in framework docs, FL literature and UK guidance.\n\n# Open items carried from the sources\n- **Context Hub** *(now resolved)*: the primary source is Andrew Ng's open registry [Context Hub](../frameworks/context-hub.md) (`andrewyng/context-hub`, MIT). It confirms the architectural point — a content/skills registry (curated, versioned docs and [agent skills](../glossary/agent-skill.md), with annotations-as-untrusted and author feedback) is distinct from [MCP](../standards/mcp.md) transport and [A2A](../standards/a2a.md) interoperability.\n- Federated LLM fine-tuning evidence in regulated UK settings is thinner than classical FL; named UK local-authority FL deployments are sparse.\n\n# Conventions\nGlossary terms are linked from the concept that uses them; relationship direction is meaningful; see [Linking conventions](../index.md).\n\n# Terms\nGlossary terms used here: [Agent skill](../glossary/agent-skill.md)."},"document/sources/agent-ready-infrastructure-paper.md":{"type":"Source document","title":"From API-Calling LLMs to Agent-Ready Digital Infrastructure","description":"The substantive paper on the agent-ready stack, benchmarks, protocols and governance.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"A ~7,300-word, ~66-reference paper arguing that API-calling is one layer of an agent-capable stack, mapping the [discovery-to-governance lifecycle](../themes/discovery-to-governance.md), the [failure taxonomy](../themes/failure-taxonomy.md), and comparative matrices of specs, auth methods and frameworks. The canonical source for this bundle's agent-ready thread."},"document/sources/engineering-deck.md":{"type":"Source document","title":"Engineering Agent-Ready Infrastructure (deck)","description":"A 15-slide visual summary of the agent-ready paper.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"An image-based slide deck summarising the agent-ready infrastructure argument for a presentation audience. Its substance mirrors the [agent-ready paper](agent-ready-infrastructure-paper.md)."},"document/sources/federated-ai-report.md":{"type":"Source document","title":"Federated AI Research Execution Report","description":"Multi-agent study of FL frameworks, deployments, privacy and UK policy.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"A multi-workstream research report (literature, primary sources, deployments, comparative evaluation, UK policy, security, architecture, OKF packaging, red-team) concluding that federated AI is the **[missing collaborative-learning layer](../themes/missing-collaborative-learning-layer.md)** and that success depends on governance, not framework choice alone. Canonical source for this bundle's federated thread."},"document/sources/index.md":{"type":"Index","title":"Source documents","description":"The papers and deck this bundle is built from.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"# Source documents\n\nThe papers and deck this bundle is built from.\n\n- [From API-Calling LLMs to Agent-Ready Digital Infrastructure](agent-ready-infrastructure-paper.md) — The substantive paper on the agent-ready stack, benchmarks, protocols and governance.\n- [Federated AI Research Execution Report](federated-ai-report.md) — Multi-agent study of FL frameworks, deployments, privacy and UK policy.\n- [Engineering Agent-Ready Infrastructure (deck)](engineering-deck.md) — A 15-slide visual summary of the agent-ready paper."},"document/themes/agent-ready-not-agent-trusting.md":{"type":"Concept","title":"Agent-ready, not agent-trusting","description":"Understanding a tool is never authority to use it.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"The proposition that *agent-ready must not mean agent-trusting* is strongly supported. An agent runtime should hold short-lived, narrowly-scoped, audience- and purpose-bound, preferably [sender-constrained](../../glossary/sender-constrained-token.md) credentials — never a single broad ambient credential. The model knowing *how* to call a tool says nothing about *whether*, *in whose name*, or *under what constraints*. See [identity and authorisation](../../stack/identity-and-authorisation.md)."},"document/themes/discovery-to-governance.md":{"type":"Concept","title":"The discovery-to-governance lifecycle","description":"Intent → retrieve → select/bind → authorise → execute → record evidence.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"The architecture that emerges: users express intent; the runtime retrieves current capability descriptions; the model selects tools and binds arguments against formal schemas; the authorisation layer establishes who/what is acting and with which limits; an execution substrate handles retries and compensation; and an evidence layer records provenance, traces, policy decisions and consents. See the [control plane](../../stack/control-plane.md).\n\n# Terms\nGlossary terms used here: [Compensation](../../glossary/compensation.md), [Provenance](../../glossary/provenance.md)."},"document/themes/evaluation-format-to-execution.md":{"type":"Concept","title":"Evaluation moved from format to execution","description":"Benchmarks shifted from argument syntax to state, policy and outcome reliability.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"The most important trend in the research: evaluation moved from **format correctness** (can the model emit a valid call?) to **execution correctness** (does the multi-step task complete reliably under state, policy and dynamic users?). [Gorilla/APIBench](../../research/gorilla.md) tested syntax; [AgentBench](../../research/agentbench.md), [ToolSandbox](../../research/toolsandbox.md) and [τ-bench](../../research/tau-bench.md) test state, policy and outcomes."},"document/themes/failure-taxonomy.md":{"type":"Concept","title":"Failure taxonomy","description":"Seven failure classes, each with its own controls — not just 'stale data'.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"Agent failure is not merely stale training data. The classes are: **epistemic** (stale knowledge → retrieval/version pinning); **syntactic** (malformed calls → [JSON Schema](../../standards/json-schema.md)/structured output); **semantic** (schema-valid but wrong → [semantic grounding](../../stack/understanding-and-grounding.md)/evals); **operational** (timeouts, duplicates → retries/[idempotency](../../glossary/idempotency.md)); **security** ([prompt injection](../../glossary/prompt-injection.md), poisoned descriptions → trusted registries/sandboxing); **authority** (excess scope, [confused deputy](../../glossary/confused-deputy.md) → [least privilege](../../glossary/least-privilege.md)/scoped tokens); and **governance** (no audit/consent → [provenance](../../glossary/provenance.md), policy logging).\n\n# Terms\nGlossary terms used here: [Confused deputy](../../glossary/confused-deputy.md), [Consent](../../glossary/consent.md), [Idempotency](../../glossary/idempotency.md), [Least privilege](../../glossary/least-privilege.md), [Prompt injection](../../glossary/prompt-injection.md), [Provenance](../../glossary/provenance.md), [Semantic grounding](../../glossary/semantic-grounding.md), [Structured output](../../glossary/structured-output.md)."},"document/themes/index.md":{"type":"Index","title":"Themes","description":"The load-bearing ideas across both threads.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"# Themes\n\nThe load-bearing ideas across both threads.\n\n- [The discovery-to-governance lifecycle](discovery-to-governance.md) — Intent → retrieve → select/bind → authorise → execute → record evidence.\n- [Agent-ready, not agent-trusting](agent-ready-not-agent-trusting.md) — Understanding a tool is never authority to use it.\n- [The missing collaborative-learning layer](missing-collaborative-learning-layer.md) — Orchestration standards don't define how institutions jointly improve a model.\n- [Failure taxonomy](failure-taxonomy.md) — Seven failure classes, each with its own controls — not just 'stale data'.\n- [Evaluation moved from format to execution](evaluation-format-to-execution.md) — Benchmarks shifted from argument syntax to state, policy and outcome reliability.\n- [Recommendations and roadmap](recommendations-roadmap.md) — Harden the substrate in stages: inventory → control plane → institutional capability.\n- [UK public-sector implications](uk-public-sector-implications.md) — Roles, SLAs and liability shift as agents move from answering to acting."},"document/themes/missing-collaborative-learning-layer.md":{"type":"Concept","title":"The missing collaborative-learning layer","description":"Orchestration standards don't define how institutions jointly improve a model.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"[MCP](../../standards/mcp.md) and [Arazzo](../../standards/arazzo.md) standardise interaction and workflow composition, but neither defines how remote parties **train or evaluate a shared model while keeping data local**. That is a distinct architectural layer — [the federation layer](../../stack/federation-layer.md) — which [federated learning](../../federated/federated-learning.md) frameworks such as [Flower](../../frameworks/flower.md) make explicit."},"document/themes/recommendations-roadmap.md":{"type":"Concept","title":"Recommendations and roadmap","description":"Harden the substrate in stages: inventory → control plane → institutional capability.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"Don't wait for a mythical autonomous stack; harden the substrate in stages. **Short term**: inventory the capability estate, publish/clean contracts, stand up a catalogue with ownership and trust metadata, add linting, mocks, sandboxes, narrow scopes and sender constraints; capture traces and [provenance](../../glossary/provenance.md) from day one. **Medium term**: a dedicated execution/control plane that separates planning from execution, validates arguments, delegates policy to [OPA](../../standards/opa.md), and adopts [workload identity](../../standards/spiffe-spire.md). **Long term**: converge on agent-ready infrastructure as an institutional capability — registries, versioned retrieval, policy-as-code, evidence standards, and the [federation layer](../../stack/federation-layer.md).\n\n# Terms\nGlossary terms used here: [Policy-as-code](../../glossary/policy-as-code.md), [Provenance](../../glossary/provenance.md), [Workload identity](../../glossary/workload-identity.md)."},"document/themes/uk-public-sector-implications.md":{"type":"Concept","title":"UK public-sector implications","description":"Roles, SLAs and liability shift as agents move from answering to acting.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"document","body":"The organisational impact exceeds the model-cost impact. Roles shift: API owners become capability owners; IAM teams become delegation-and-trust teams; platform teams own registries, policy engines and observability; assurance functions need evidence standards. New SLAs cover specification freshness, token-issuance latency, sandbox fidelity, policy-evaluation availability and trace completeness. **Liability** shifts from *what did the model know?* to *which principal delegated authority, under which policy, using which contract version, with what consent and audit trail?* — which is why [provenance](../../stack/observability-and-provenance.md), policy separation and [zero trust](../../standards/zero-trust.md) become load-bearing. Transparency obligations include the [ATRS](../../uk-government/atrs.md).\n\n# Terms\nGlossary terms used here: [Audit trail](../../glossary/audit-trail.md), [Consent](../../glossary/consent.md), [Provenance](../../glossary/provenance.md)."},"federated/cross-device-vs-cross-silo.md":{"type":"Concept","title":"Cross-device vs cross-silo","description":"Large fleets of weak devices vs a few institutions with legal separation.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"The primary FL axis. **Cross-device**: large fleets of weak/intermittent devices (phones), optimising for scale, bandwidth and participation. **Cross-silo**: a small number of institutions (hospitals, councils), optimising for trust, governance, legal separation and coordination. UK public-sector federation is overwhelmingly cross-silo.\n\nRelates to: [Federated learning](federated-learning.md), [MELLODDY](../research/melloddy.md)."},"federated/differential-privacy.md":{"type":"Concept","title":"Differential privacy","description":"A formal bound on what any individual contributes to a released result.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Adds calibrated noise so that the presence or absence of any single record has a bounded effect on outputs — a standard countermeasure against inference about individual contributors. Composable with [secure aggregation](secure-aggregation.md) and [TEEs](trusted-execution-environments.md).\n\nRelates to: [Membership inference](membership-inference.md)."},"federated/evaluation-rubric.md":{"type":"Concept","title":"Multi-dimensional evaluation rubric","description":"Judge federations on utility *and* governance, not accuracy alone.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Success in government settings must be measured on several dimensions at once: model utility, communication/computation efficiency, robustness, privacy protection, reproducibility and governance/operability. A framework strong on accuracy but weak on auditability, identity or human oversight is **not** successful in a public-sector context.\n\n# Terms\nGlossary terms used here: [Audit trail](../glossary/audit-trail.md)."},"federated/federated-analytics.md":{"type":"Concept","title":"Federated analytics","description":"Distributed statistics and monitoring without training a model.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Extends decentralisation to statistics and monitoring rather than only model training — answering distributed statistical questions or deriving insight without centralising raw data. Recent work shows TEE-backed federated analytics deployed at production scale.\n\nRelates to: [Federated learning](federated-learning.md), [Trusted execution environments](trusted-execution-environments.md)."},"federated/federated-evaluation.md":{"type":"Concept","title":"Federated evaluation","description":"Measuring models when data and outcome definitions stay distributed.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Evaluation is a **first-class systems problem** in FL: centralised test assumptions often fail when data and outcome definitions remain distributed. A substantial literature now treats federated evaluation in its own right.\n\nRelates to: [Evaluation rubric](evaluation-rubric.md), [Non-IID data](non-iid-data.md)."},"federated/federated-learning.md":{"type":"Concept","title":"Federated learning","description":"Many clients train a shared model under orchestration while data stays decentralised.","resource":"https://arxiv.org/abs/1602.05629","timestamp":"2017-02-01T00:00:00Z","aliases":"","section":"federated","body":"A machine-learning setting in which many clients collaborate to train a shared model while keeping training data **decentralised**, distinguished from ordinary distributed learning by heterogeneous data, intermittent participation and decentralised control. Federated AI reduces the need to centralise raw data, but does **not** remove the need for privacy engineering or governance — updates can still leak information.\n\nRelates to: [The federation layer](../stack/federation-layer.md), [FedAvg](../research/fedavg.md), [Secure aggregation](secure-aggregation.md)."},"federated/federated-rag.md":{"type":"Concept","title":"Federated / confidential RAG","description":"Applying the federated pattern to LLM-era retrieval and generation.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Emerging work (e.g. Flower-based secure federated RAG) applies decentralisation to retrieval-augmented generation, keeping documents and indices distributed. The evidence base is still smaller than for classical FL.\n\nRelates to: [Flower](../frameworks/flower.md), [Federated learning](federated-learning.md)."},"federated/federated-unlearning.md":{"type":"Concept","title":"Federated unlearning","description":"Removing a participant's influence from a trained model.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Methods to remove a client's contribution from an already-trained model — important for data-subject rights and exit. A maturing subfield and a sign that federated systems are governed systems, not just ML."},"federated/homomorphic-encryption-mpc.md":{"type":"Concept","title":"Homomorphic encryption & MPC","description":"Computing over encrypted data / across parties without revealing inputs.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Secure computation techniques — homomorphic encryption and multi-party computation — that let parties compute joint results without revealing their inputs. Central to industrial-grade frameworks such as [FATE](../frameworks/fate.md); computationally heavier than [secure aggregation](secure-aggregation.md) or [DP](differential-privacy.md)."},"federated/hub-and-spoke-vs-hierarchical.md":{"type":"Concept","title":"Hub-and-spoke vs hierarchical coordination","description":"Centralised aggregation vs hierarchical/asynchronous/enclave-backed designs.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Federations can be centrally orchestrated (hub-and-spoke) or use hierarchical, partially asynchronous or enclave-backed aggregators for resilience and scale. Whether public-sector federations should remain hub-and-spoke is an open architectural question; systems research (e.g. Flotilla) shows newer designs can exceed Flower on very large, unstable federations.\n\nRelates to: [Flower](../frameworks/flower.md), [Flotilla](../frameworks/flotilla.md)."},"federated/index.md":{"type":"Index","title":"Federated AI","description":"The collaborative-learning layer: federated learning, privacy and evaluation.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"# Federated AI\n\nThe collaborative-learning layer: federated learning, privacy and evaluation.\n\n- [Federated learning](federated-learning.md) — Many clients train a shared model under orchestration while data stays decentralised.\n- [Secure aggregation](secure-aggregation.md) — The server learns the aggregate of updates, not any individual update.\n- [Cross-device vs cross-silo](cross-device-vs-cross-silo.md) — Large fleets of weak devices vs a few institutions with legal separation.\n- [Federated analytics](federated-analytics.md) — Distributed statistics and monitoring without training a model.\n- [Federated evaluation](federated-evaluation.md) — Measuring models when data and outcome definitions stay distributed.\n- [Non-IID data](non-iid-data.md) — Heterogeneity is intrinsic, not incidental, in federated settings.\n- [Differential privacy](differential-privacy.md) — A formal bound on what any individual contributes to a released result.\n- [Trusted execution environments (TEEs)](trusted-execution-environments.md) — Hardware-isolated computation strengthening server-side confidentiality.\n- [Homomorphic encryption & MPC](homomorphic-encryption-mpc.md) — Computing over encrypted data / across parties without revealing inputs.\n- [Membership inference & gradient leakage](membership-inference.md) — Privacy attacks that recover information from model updates.\n- [Model poisoning & backdoors](model-poisoning-backdoors.md) — Malicious participants corrupt the shared model.\n- [Federated unlearning](federated-unlearning.md) — Removing a participant's influence from a trained model.\n- [Federated / confidential RAG](federated-rag.md) — Applying the federated pattern to LLM-era retrieval and generation.\n- [Multi-dimensional evaluation rubric](evaluation-rubric.md) — Judge federations on utility *and* governance, not accuracy alone.\n- [Hub-and-spoke vs hierarchical coordination](hub-and-spoke-vs-hierarchical.md) — Centralised aggregation vs hierarchical/asynchronous/enclave-backed designs."},"federated/membership-inference.md":{"type":"Concept","title":"Membership inference & gradient leakage","description":"Privacy attacks that recover information from model updates.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Attacks that determine whether a record was in the training set, or reconstruct data from gradients — evidence that FL is **not inherently private enough** for regulated public services. Motivates [secure aggregation](secure-aggregation.md) and [differential privacy](differential-privacy.md)."},"federated/model-poisoning-backdoors.md":{"type":"Concept","title":"Model poisoning & backdoors","description":"Malicious participants corrupt the shared model.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Without strong node authentication, malicious or compromised participants can poison the shared model or implant backdoors. Access control and node identity matter as much as cryptography: if unauthorised participants can join, poisoning and replay risks remain.\n\nRelates to: [Security and privacy of federation](../document/themes/uk-public-sector-implications.md), [SPIFFE/SPIRE](../standards/spiffe-spire.md)."},"federated/non-iid-data.md":{"type":"Concept","title":"Non-IID data","description":"Heterogeneity is intrinsic, not incidental, in federated settings.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Data across clients is not independently and identically distributed; heterogeneity is a **structural condition**, not noise. Any architecture assuming IID data or uniform device availability will underperform in realistic settings, motivating clustering, personalisation and heterogeneity-aware methods.\n\nRelates to: [Federated learning](federated-learning.md), [Kairouz: advances and open problems](../research/kairouz-open-problems.md)."},"federated/secure-aggregation.md":{"type":"Concept","title":"Secure aggregation","description":"The server learns the aggregate of updates, not any individual update.","resource":"https://arxiv.org/abs/1611.04482","timestamp":"2017-10-01T00:00:00Z","aliases":"","section":"federated","body":"A cryptographic protocol so the coordinating server can compute the *sum* of client updates without reading any individual contribution. Often necessary because model updates can leak information. A composable trust layer alongside [differential privacy](differential-privacy.md).\n\nRelates to: [Federated learning](federated-learning.md), [Membership inference](membership-inference.md)."},"federated/trusted-execution-environments.md":{"type":"Concept","title":"Trusted execution environments (TEEs)","description":"Hardware-isolated computation strengthening server-side confidentiality.","resource":"https://confidentialcomputing.io/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"federated","body":"Hardware-isolated enclaves that strengthen server-side confidentiality and verifiability of federated computation. They improve confidentiality but do **not** remove the need for code review, attestation policy, procurement assurance or oversight — how far to trust TEEs organisationally and politically is an open public-sector question.\n\nRelates to: [Federated analytics](federated-analytics.md), [Confidential computing](../organisations/cncf.md).\n\n# Terms\nGlossary terms used here: [Attestation](../glossary/attestation.md)."},"frameworks/autogen.md":{"type":"Framework","title":"AutoGen","description":"Conversational single- and multi-agent programming framework.","resource":"https://microsoft.github.io/autogen/stable/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"Microsoft's event-driven, conversational multi-agent framework with a modular stack — used for multi-agent workflows, prototyping and research-to-production bridges."},"frameworks/context-hub.md":{"type":"Tool / registry","title":"Context Hub","description":"Andrew Ng open content/skills registry: curated, versioned docs (and skills) for coding agents.","resource":"https://github.com/andrewyng/context-hub","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"# What it is\n**Context Hub** (Andrew Ng; MIT-licensed, npm `@aisuite/chub`) gives coding agents **curated, versioned, language-specific documentation** — with agent skills on the roadmap — so they stop hallucinating APIs and forgetting what they learn within a session. All content is **open markdown with YAML frontmatter** in a public repo (the same shape as an OKF bundle), so you can inspect exactly what an agent reads and contribute back by pull request.\n\n# How it works\nDesigned for the **agent**, not the human, through a `chub` CLI: `chub search`, `chub get <id> --lang py|js`, `chub annotate`, `chub feedback up|down`. **Incremental fetch** returns only the reference files needed, to avoid wasting tokens. It can be wrapped as an [agent skill](../glossary/agent-skill.md) via a SKILL.md.\n\n# Self-improving loop\n**Annotations** are local notes an agent attaches to a doc; they persist across sessions and can be re-injected (`--with-annotations`, off by default) but are **treated as untrusted input**. **Feedback** (up/down ratings) flows back to doc authors, so the curated content improves for everyone — not just locally. This directly addresses the [prompt injection](../glossary/prompt-injection.md) risk for retrieved content.\n\n# Where it sits in the stack\nA **content/skills registry** layer that serves the [discovery and retrieval](../stack/discovery-and-retrieval.md) layer with curated, versioned, trust-annotated context. It is conceptually **distinct** from [MCP](../standards/mcp.md) (agent-to-tool transport) and [A2A](../standards/a2a.md) (agent-to-agent interoperability) — the concrete instance that resolves the \"Context Hub\" open question flagged in the source paper.\n\nRelates to: [MCP](../standards/mcp.md), [A2A](../standards/a2a.md), [Discovery and retrieval](../stack/discovery-and-retrieval.md), [Agent skill](../glossary/agent-skill.md), [Evaluation note](../document/peer-review.md).\n\n# Terms\nGlossary terms used here: [Agent skill](../glossary/agent-skill.md), [Prompt injection](../glossary/prompt-injection.md)."},"frameworks/fate.md":{"type":"Framework","title":"FATE","description":"Industrial-grade FL with HE/MPC secure computation.","resource":"https://github.com/FederatedAI/FATE","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"An industrial-grade federated framework with secure computation based on homomorphic encryption and MPC — especially relevant where [HE/MPC](../federated/homomorphic-encryption-mpc.md) is central. Apache-2.0."},"frameworks/fedml.md":{"type":"Framework","title":"FedML / TensorOpera","description":"Scalable distributed training/deployment across GPUs, cloud, edge, smartphones.","resource":"https://fedml.ai/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"A scalable, unified training and deployment library spanning decentralised GPUs, cloud, edge and smartphones; broader MLOps ambition. Its public positioning now blends open-source FL with a wider commercial AI platform."},"frameworks/flotilla.md":{"type":"Framework","title":"Flotilla","description":"Research system for large-scale, asynchronous, fault-tolerant federations.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"A systems research framework showing stronger scaling and resilience than Flower, OpenFL and FedML in some large-scale heterogeneous edge scenarios, especially with asynchronous, fault-tolerant designs — a reminder that the design space is still moving.\n\nRelates to: [Hub-and-spoke vs hierarchical](../federated/hub-and-spoke-vs-hierarchical.md)."},"frameworks/flower.md":{"type":"Framework","title":"Flower","description":"Framework-agnostic federated AI: simulation-to-deployment, secure agg, DP, audit, OIDC.","resource":"https://flower.ai/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"An open-source federated AI framework with a clean split between **simulation** and **deployment** runtimes (SuperLink, SuperExec, ServerApp, SuperNodes). Framework-agnostic across PyTorch, TensorFlow, Hugging Face, scikit-learn, JAX, XGBoost. Public docs show secure aggregation, differential privacy, TLS, SuperNode authentication, enterprise audit logging and OIDC/OpenFGA authorisation. A strong **\"missing middle\"** bridge between research and operations — but not the only answer.\n\nRelates to: [The federation layer](../stack/federation-layer.md), [Flower Labs](../organisations/flower-labs.md)."},"frameworks/index.md":{"type":"Index","title":"Frameworks & middleware","description":"Agent frameworks and federated-learning frameworks.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"# Frameworks & middleware\n\nAgent frameworks and federated-learning frameworks.\n\n- [OpenAI Agents SDK & Responses API](openai-agents-sdk.md) — Multi-tool/multi-agent orchestration, built-in tools, streaming, observability.\n- [Semantic Kernel](semantic-kernel.md) — Middleware translating model requests into existing functions/plugins.\n- [AutoGen](autogen.md) — Conversational single- and multi-agent programming framework.\n- [Flower](flower.md) — Framework-agnostic federated AI: simulation-to-deployment, secure agg, DP, audit, OIDC.\n- [NVIDIA FLARE](nvidia-flare.md) — Production-oriented FL SDK: admin, monitoring, access control, confidential computing.\n- [Substra](substra.md) — Production FL for regulated health/biotech; Kubernetes, auditable logs.\n- [FATE](fate.md) — Industrial-grade FL with HE/MPC secure computation.\n- [PySyft](pysyft.md) — Privacy-preserving remote analysis on data that stays put.\n- [FedML / TensorOpera](fedml.md) — Scalable distributed training/deployment across GPUs, cloud, edge, smartphones.\n- [TensorFlow Federated](tensorflow-federated.md) — Research framework for custom federated computations.\n- [OpenFL](openfl.md) — Open Federated Learning library (LF AI & Data).\n- [Flotilla](flotilla.md) — Research system for large-scale, asynchronous, fault-tolerant federations.\n- [Context Hub](context-hub.md) — Andrew Ng open content/skills registry for coding agents."},"frameworks/nvidia-flare.md":{"type":"Framework","title":"NVIDIA FLARE","description":"Production-oriented FL SDK: admin, monitoring, access control, confidential computing.","resource":"https://nvflare.readthedocs.io/en/main/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"An operations-oriented FL SDK foregrounding deployment, admin commands, preflight checks, monitoring, auditing, identity/access control, site policy and confidential computing. A serious contender where operational controls and enterprise deployment dominate over lightweight openness. Apache-2.0."},"frameworks/openai-agents-sdk.md":{"type":"Framework","title":"OpenAI Agents SDK & Responses API","description":"Multi-tool/multi-agent orchestration, built-in tools, streaming, observability.","resource":"https://openai.com/index/new-tools-for-building-agents/","timestamp":"2025-03-11T00:00:00Z","aliases":"","section":"frameworks","body":"OpenAI's March 2025 agent tooling: a Responses API positioned as a flexible foundation for complex multi-tool, multi-turn tasks with streaming events, an Agents SDK and integrated observability/tracing. Single- and multi-agent development on the OpenAI stack.\n\nRelates to: [Execution and orchestration](../stack/execution-and-orchestration.md), [OpenAI](../organisations/openai.md)."},"frameworks/openfl.md":{"type":"Framework","title":"OpenFL","description":"Open Federated Learning library (LF AI & Data).","resource":"https://openfl.readthedocs.io/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"An open federated learning library (originally Intel; now LF AI & Data). Often compared with Flower and FedML on large-scale edge scenarios; included here for completeness."},"frameworks/pysyft.md":{"type":"Framework","title":"PySyft","description":"Privacy-preserving remote analysis on data that stays put.","resource":"https://github.com/OpenMined/PySyft","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"OpenMined's library for remote analysis on data that stays on someone else's server, with isolated job execution and mock/private dataset separation. Best seen as adjacent infrastructure for privacy-preserving remote analysis rather than a like-for-like FL orchestrator."},"frameworks/semantic-kernel.md":{"type":"Framework","title":"Semantic Kernel","description":"Middleware translating model requests into existing functions/plugins.","resource":"https://learn.microsoft.com/en-us/semantic-kernel/overview/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"Microsoft's enterprise-focused SDK (C#, Python, Java) that translates model requests into existing functions/plugins, with OpenAPI plugin support and telemetry hooks. Good for adding agent/tool behaviour to existing enterprise codebases."},"frameworks/substra.md":{"type":"Framework","title":"Substra","description":"Production FL for regulated health/biotech; Kubernetes, auditable logs.","resource":"https://docs.substra.org/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"Production-oriented federated learning software (LF AI & Data) emphasising Kubernetes packaging, auditable logs and demonstrated use in hospitals and biotech — notably [MELLODDY](../research/melloddy.md) and HealthChain. Strong where auditability and regulated health/biotech workflows matter.\n\n# Terms\nGlossary terms used here: [Audit trail](../glossary/audit-trail.md)."},"frameworks/tensorflow-federated.md":{"type":"Framework","title":"TensorFlow Federated","description":"Research framework for custom federated computations.","resource":"https://www.tensorflow.org/federated","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"frameworks","body":"Google's open framework for research and experimentation on decentralised data — strong for custom federated computations and method development, weaker as a ready-made public-sector operating platform."},"glossary/agent-card.md":{"type":"Glossary term","title":"Agent Card","description":"A2A's machine-readable description of an agent's capabilities.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"agent card; agent cards","section":"glossary","body":"# Definition\nA JSON document by which an agent advertises its capabilities for discovery — the [A2A](../standards/a2a.md) mechanism, analogous to a service description for agents.\n\n# Used in this bundle\nAppears in: [a2a](../standards/a2a.md), [discovery-and-retrieval](../stack/discovery-and-retrieval.md).\n\n# Related terms\n[tool discovery](tool-discovery.md)."},"glossary/agent-skill.md":{"type":"Glossary term","title":"Agent skill","description":"A reusable, packaged instruction/workflow bundle for an agent.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"agent skill; agent skills; skills","section":"glossary","body":"# Definition\nA reusable, packaged instruction or workflow bundle for an agent — distinct from a tool or an API, and the kind of artefact a content/skills registry such as [Context Hub](../frameworks/context-hub.md) curates.\n\n# Used in this bundle\nAppears in: [control-plane](../stack/control-plane.md).\n\n# Related terms\n[tool use](tool-use.md), [workflow engine](workflow-engine.md)."},"glossary/api-calling.md":{"type":"Glossary term","title":"API calling","description":"Outbound calls to remote services (REST, GraphQL, gRPC, events).","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"api calling; api call","section":"glossary","body":"# Definition\nThe broader class of outbound interactions with remote services — REST, GraphQL, gRPC or event-driven — not necessarily via a vendor 'function' abstraction.\n\n# Used in this bundle\nAppears in: [openapi](../standards/openapi.md).\n\n# Related terms\n[function calling](function-calling.md), [tool use](tool-use.md)."},"glossary/api-gateway.md":{"type":"Glossary term","title":"API gateway","description":"Runtime enforcement point for authn/z, rate limiting, routing and logging.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"api gateway; gateway","section":"glossary","body":"# Definition\nA runtime enforcement point for authentication/authorisation, rate limiting, routing and logging — **not** a semantic layer.\n\n# Used in this bundle\nAppears in: [openapi](../standards/openapi.md), [policy-enforcement](../stack/policy-enforcement.md).\n\n# Related terms\n[policy as code](policy-as-code.md)."},"glossary/attestation.md":{"type":"Glossary term","title":"Attestation","description":"Cryptographic proof of a workload's or node's identity/integrity.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"attestation; node attestation; remote attestation","section":"glossary","body":"# Definition\nCryptographic proof of a workload's or node's identity and integrity — the basis for [SPIFFE/SPIRE](../standards/spiffe-spire.md) workload identity and for trusting [TEEs](../federated/trusted-execution-environments.md).\n\n# Used in this bundle\nAppears in: [spiffe-spire](../standards/spiffe-spire.md), [trusted-execution-environments](../federated/trusted-execution-environments.md).\n\n# Related terms\n[workload identity](workload-identity.md)."},"glossary/audit-trail.md":{"type":"Glossary term","title":"Audit trail","description":"A trustworthy record of what an agent read, decided and did.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"audit trail; auditability","section":"glossary","body":"# Definition\nA trustworthy record of what an agent read, which instructions influenced it, which tools it invoked, what it changed and under whose authority — strategic for public-sector scrutiny and the [ATRS](../uk-government/atrs.md).\n\n# Used in this bundle\nAppears in: [observability-and-provenance](../stack/observability-and-provenance.md), [atrs](../uk-government/atrs.md).\n\n# Related terms\n[provenance](provenance.md), [consent](consent.md)."},"glossary/bearer-token.md":{"type":"Glossary term","title":"Bearer token","description":"A credential where mere possession grants access.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"bearer token; bearer","section":"glossary","body":"# Definition\nA credential where **possession is enough** — anyone holding it can use it, so a stolen token can be replayed. Mitigated by [sender-constrained tokens](sender-constrained-token.md).\n\n# Used in this bundle\nAppears in: [oauth-2-0](../standards/oauth-2-0.md).\n\n# Related terms\n[sender constrained token](sender-constrained-token.md), [workload identity](workload-identity.md)."},"glossary/compensation.md":{"type":"Glossary term","title":"Compensation","description":"Undoing or offsetting a completed step in a multi-step workflow.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"compensation; compensating action; rollback","section":"glossary","body":"# Definition\nAn action that undoes or offsets a completed step when a later step fails — the multi-step analogue of rollback. A runtime concern, not a model concern.\n\n# Used in this bundle\nAppears in: [execution-and-orchestration](../stack/execution-and-orchestration.md).\n\n# Related terms\n[idempotency](idempotency.md)."},"glossary/confused-deputy.md":{"type":"Glossary term","title":"Confused deputy","description":"A privileged component tricked into misusing its authority for another.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"confused deputy","section":"glossary","body":"# Definition\nAn authority failure in which a privileged component is tricked into using its permissions on behalf of a less-privileged caller — a core risk when agents chain tools.\n\n# Used in this bundle\nAppears in: [identity-and-authorisation](../stack/identity-and-authorisation.md).\n\n# Related terms\n[least privilege](least-privilege.md)."},"glossary/consent.md":{"type":"Glossary term","title":"Consent","description":"Explicit user permission for data exposure or action.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"consent; user consent","section":"glossary","body":"# Definition\nExplicit user permission for data exposure, tool invocation or sampling. [MCP](../standards/mcp.md) requires it in principle but cannot enforce it; consent should be recorded at the system boundary, not inferred from prompt logs.\n\n# Used in this bundle\nAppears in: [mcp](../standards/mcp.md), [observability-and-provenance](../stack/observability-and-provenance.md).\n\n# Related terms\n[audit trail](audit-trail.md), [provenance](provenance.md)."},"glossary/function-calling.md":{"type":"Glossary term","title":"Function calling","description":"A model emitting a tool invocation against a declared function schema.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"function calling; function call; tool calling","section":"glossary","body":"# Definition\nA model generating a tool invocation against a **declared function schema** — a vendor-native abstraction, the bridge from natural language to external systems.\n\n# Used in this bundle\nAppears in: [structured-outputs](../standards/structured-outputs.md), [openai](../organisations/openai.md).\n\n# Related terms\n[api calling](api-calling.md), [tool use](tool-use.md), [structured output](structured-output.md)."},"glossary/idempotency.md":{"type":"Glossary term","title":"Idempotency","description":"An operation that can be safely repeated with the same effect.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"idempotency; idempotent","section":"glossary","body":"# Definition\nAn operation that can be repeated safely with the same effect as doing it once — so a retry will not duplicate side effects. Owned by the runtime, not the prompt.\n\n# Used in this bundle\nAppears in: [execution-and-orchestration](../stack/execution-and-orchestration.md).\n\n# Related terms\n[compensation](compensation.md)."},"glossary/index.md":{"type":"Index","title":"Glossary","description":"Plain-English definitions of the technical terms used across the bundle.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"glossary","body":"# Glossary\n\nPlain-English definitions of the technical terms used across the bundle.\n\n- [Structured output](structured-output.md) — Constraining a model's output to a schema; guarantees form, not authority.\n- [Function calling](function-calling.md) — A model emitting a tool invocation against a declared function schema.\n- [API calling](api-calling.md) — Outbound calls to remote services (REST, GraphQL, gRPC, events).\n- [Tool use](tool-use.md) — The widest term: APIs, code execution, search, retrieval, workflow calls.\n- [Tool discovery](tool-discovery.md) — Finding that a capability exists (catalogues, agent cards, registries).\n- [Tool retrieval](tool-retrieval.md) — Selecting a small candidate set from a large inventory at inference time.\n- [Schema grounding](schema-grounding.md) — Checking that fields and types match a formal contract.\n- [Semantic grounding](semantic-grounding.md) — Checking that intent maps to the right operation and entities.\n- [Agent skill](agent-skill.md) — A reusable, packaged instruction/workflow bundle for an agent.\n- [API gateway](api-gateway.md) — Runtime enforcement point for authn/z, rate limiting, routing and logging.\n- [Workflow engine](workflow-engine.md) — Orchestrates multi-step, stateful processes; Arazzo describes them declaratively.\n- [Workload identity](workload-identity.md) — Cryptographic identity for software workloads; 'what is calling'.\n- [Policy-as-code](policy-as-code.md) — Decoupling policy decisions from enforcement points across services.\n- [Provenance](provenance.md) — The recorded entities, activities and agents that produced an outcome.\n- [Idempotency](idempotency.md) — An operation that can be safely repeated with the same effect.\n- [Compensation](compensation.md) — Undoing or offsetting a completed step in a multi-step workflow.\n- [Sender-constrained token](sender-constrained-token.md) — A token usable only by the client that presents the right proof.\n- [Bearer token](bearer-token.md) — A credential where mere possession grants access.\n- [Least privilege](least-privilege.md) — Granting only the minimum authority needed for a task.\n- [Confused deputy](confused-deputy.md) — A privileged component tricked into misusing its authority for another.\n- [Prompt injection](prompt-injection.md) — Malicious instructions hidden in tool descriptions or retrieved content.\n- [Agent Card](agent-card.md) — A2A's machine-readable description of an agent's capabilities.\n- [Consent](consent.md) — Explicit user permission for data exposure or action.\n- [Audit trail](audit-trail.md) — A trustworthy record of what an agent read, decided and did.\n- [Attestation](attestation.md) — Cryptographic proof of a workload's or node's identity/integrity."},"glossary/least-privilege.md":{"type":"Glossary term","title":"Least privilege","description":"Granting only the minimum authority needed for a task.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"least privilege; narrow scope","section":"glossary","body":"# Definition\nGranting an agent only the **minimum authority** needed — narrow scopes rather than broad roles, separating read tools from write tools, and time-bounding access.\n\n# Used in this bundle\nAppears in: [identity-and-authorisation](../stack/identity-and-authorisation.md).\n\n# Related terms\n[confused deputy](confused-deputy.md), [sender constrained token](sender-constrained-token.md)."},"glossary/policy-as-code.md":{"type":"Glossary term","title":"Policy-as-code","description":"Decoupling policy decisions from enforcement points across services.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"policy-as-code; policy as code","section":"glossary","body":"# Definition\nExpressing authorisation/governance rules as code and **decoupling the decision from the enforcement point** across services, gateways, CI/CD and Kubernetes — the [OPA](../standards/opa.md) model.\n\n# Used in this bundle\nAppears in: [opa](../standards/opa.md), [policy-enforcement](../stack/policy-enforcement.md).\n\n# Related terms\n[api gateway](api-gateway.md)."},"glossary/prompt-injection.md":{"type":"Glossary term","title":"Prompt injection","description":"Malicious instructions hidden in tool descriptions or retrieved content.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"prompt injection; context injection; indirect injection","section":"glossary","body":"# Definition\nMalicious instructions smuggled via tool descriptions, retrieved content or untrusted annotations. [MCP](../standards/mcp.md) warns that tool descriptions should be treated as **untrusted** unless from a trusted server.\n\n# Used in this bundle\nAppears in: [failure-taxonomy](../document/themes/failure-taxonomy.md), [mcp](../standards/mcp.md).\n\n# Related terms\n[least privilege](least-privilege.md)."},"glossary/provenance.md":{"type":"Glossary term","title":"Provenance","description":"The recorded entities, activities and agents that produced an outcome.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"provenance; lineage","section":"glossary","body":"# Definition\nAn interoperable record of the **entities, activities and agents** that produced a datum or outcome ([W3C PROV](../standards/w3c-prov.md)) — load-bearing for attribution and redress.\n\n# Used in this bundle\nAppears in: [w3c-prov](../standards/w3c-prov.md), [observability-and-provenance](../stack/observability-and-provenance.md).\n\n# Related terms\n[audit trail](audit-trail.md), [consent](consent.md)."},"glossary/schema-grounding.md":{"type":"Glossary term","title":"Schema grounding","description":"Checking that fields and types match a formal contract.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"schema grounding","section":"glossary","body":"# Definition\nChecking whether fields and types match a formal contract — necessary but not sufficient. Contrast with [semantic grounding](semantic-grounding.md).\n\n# Used in this bundle\nAppears in: [understanding-and-grounding](../stack/understanding-and-grounding.md), [json-schema](../standards/json-schema.md).\n\n# Related terms\n[semantic grounding](semantic-grounding.md), [structured output](structured-output.md)."},"glossary/semantic-grounding.md":{"type":"Glossary term","title":"Semantic grounding","description":"Checking that intent maps to the right operation and entities.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"semantic grounding","section":"glossary","body":"# Definition\nChecking whether the model mapped user **intent** to the right operation, entity and parameter semantics. A call can be schema-valid yet semantically wrong.\n\n# Used in this bundle\nAppears in: [understanding-and-grounding](../stack/understanding-and-grounding.md).\n\n# Related terms\n[schema grounding](schema-grounding.md)."},"glossary/sender-constrained-token.md":{"type":"Glossary term","title":"Sender-constrained token","description":"A token usable only by the client that presents the right proof.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"sender-constrained token; sender constrained; proof-of-possession","section":"glossary","body":"# Definition\nA credential bound to the presenting client (via [mTLS](../standards/mtls-bound-tokens.md) or [DPoP](../standards/dpop.md)) so a stolen token cannot be replayed by another party — unlike a [bearer token](bearer-token.md).\n\n# Used in this bundle\nAppears in: [dpop](../standards/dpop.md), [mtls-bound-tokens](../standards/mtls-bound-tokens.md), [identity-and-authorisation](../stack/identity-and-authorisation.md).\n\n# Related terms\n[bearer token](bearer-token.md)."},"glossary/structured-output.md":{"type":"Glossary term","title":"Structured output","description":"Constraining a model's output to a schema; guarantees form, not authority.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"structured output; structured outputs","section":"glossary","body":"# Definition\nConstraining a model's output to conform to a schema (e.g. [JSON Schema](../standards/json-schema.md)) — it guarantees **form, not authority or correctness**. Schema-valid JSON is not the same as a valid or authorised action.\n\n# Used in this bundle\nAppears in: [structured-outputs](../standards/structured-outputs.md), [json-schema](../standards/json-schema.md).\n\n# Related terms\n[function calling](function-calling.md), [schema grounding](schema-grounding.md)."},"glossary/tool-discovery.md":{"type":"Glossary term","title":"Tool discovery","description":"Finding that a capability exists (catalogues, agent cards, registries).","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"tool discovery","section":"glossary","body":"# Definition\nFinding **that** a capability exists — via catalogues, [OpenAPI](../standards/openapi.md) docs, [agent cards](agent-card.md) or protocol registries. Distinct from [tool retrieval](tool-retrieval.md), which narrows a large set at inference time.\n\n# Used in this bundle\nAppears in: [discovery-and-retrieval](../stack/discovery-and-retrieval.md), [uk-api-catalogue](../uk-government/uk-api-catalogue.md).\n\n# Related terms\n[tool retrieval](tool-retrieval.md), [agent card](agent-card.md)."},"glossary/tool-retrieval.md":{"type":"Glossary term","title":"Tool retrieval","description":"Selecting a small candidate set from a large inventory at inference time.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"tool retrieval","section":"glossary","body":"# Definition\nSelecting a small candidate set of tools from a large inventory **at inference time** — narrowing the search space and improving freshness. Necessary but insufficient for trustworthy action.\n\n# Used in this bundle\nAppears in: [discovery-and-retrieval](../stack/discovery-and-retrieval.md), [gorilla](../research/gorilla.md).\n\n# Related terms\n[tool discovery](tool-discovery.md)."},"glossary/tool-use.md":{"type":"Glossary term","title":"Tool use","description":"The widest term: APIs, code execution, search, retrieval, workflow calls.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"tool use; tool-using","section":"glossary","body":"# Definition\nThe widest category of external affordance: APIs, local code execution, search, retrieval, workflow calls and other tools — broader than [function calling](function-calling.md) or [API calling](api-calling.md).\n\n# Used in this bundle\nAppears in: [control-plane](../stack/control-plane.md).\n\n# Related terms\n[function calling](function-calling.md), [api calling](api-calling.md), [agent skill](agent-skill.md)."},"glossary/workflow-engine.md":{"type":"Glossary term","title":"Workflow engine","description":"Orchestrates multi-step, stateful processes; Arazzo describes them declaratively.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"workflow engine; orchestration engine","section":"glossary","body":"# Definition\nOrchestrates multi-step, stateful processes with retries, [compensation](compensation.md) and durable state. [Arazzo](../standards/arazzo.md) describes such workflows declaratively.\n\n# Used in this bundle\nAppears in: [arazzo](../standards/arazzo.md), [execution-and-orchestration](../stack/execution-and-orchestration.md).\n\n# Related terms\n[compensation](compensation.md), [idempotency](idempotency.md)."},"glossary/workload-identity.md":{"type":"Glossary term","title":"Workload identity","description":"Cryptographic identity for software workloads; 'what is calling'.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"workload identity; non-human identity","section":"glossary","body":"# Definition\nCryptographic identity for software workloads (e.g. via [SPIFFE/SPIRE](../standards/spiffe-spire.md)) — answers *what is calling*, complementary to OAuth's *on whose behalf*.\n\n# Used in this bundle\nAppears in: [spiffe-spire](../standards/spiffe-spire.md), [identity-and-authorisation](../stack/identity-and-authorisation.md).\n\n# Related terms\n[bearer token](bearer-token.md), [attestation](attestation.md)."},"index.md":{"type":"Index","title":"ai-infrastructure-wiki — AI infrastructure (OKF bundle)","description":"An Open Knowledge Format bundle on agent-ready digital infrastructure and the federated collaborative-learning layer.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"root","body":"# ai-infrastructure-wiki\n\nAn **Open Knowledge Format (OKF v0.1)** bundle covering **AI infrastructure** in two complementary threads: the **agent-ready vertical stack** (contracts → discovery → identity → execution → policy → observability/provenance) and the **federated collaborative-learning layer**. Just markdown + YAML frontmatter, cross-linked into a graph; open `viewer.html` for the interactive view.\n\n## Contents\n- **[The reviewed sources](document/index.md)** — overview, [themes](document/themes/index.md), [source documents](document/sources/index.md), [evaluation](document/peer-review.md).\n- **[Stack layers](stack/index.md)** (9) · **[Standards](standards/index.md)** (21) · **[Federated AI](federated/index.md)** (15)\n- **[Frameworks](frameworks/index.md)** (12) · **[Research & benchmarks](research/index.md)** (17)\n- **[UK government](uk-government/index.md)** (10) · **[Organisations](organisations/index.md)** (16) · **[Glossary](glossary/index.md)** (25)\n- **[Sources index](sources-index.md)** · **[Change log](log.md)**\n\n## Linking conventions\n\nOKF v0.1 links are plain markdown — unidirectional and untyped. This bundle adopts two conventions the spec leaves open (see the companion proposal in the sibling `okf-proposal/`):\n\n1. **Glossary/vocabulary** terms are linked **from the concept that uses them** (a `Terms` section), mirroring wiki practice; each glossary entry also lists where it is used, so the term↔concept relationship is bidirectional in the files.\n2. **Direction is meaningful** (a link means *source references target*); consumers build the reverse index (the viewer's \"Referenced by\"). Relationship *types* (defines, stewards, introduces, adopts…) are inferred by the viewer from section + direction.\n\n## Companion\nThis is a standalone sibling of `api-mcp-wiki`. Where they share standards (OpenAPI, MCP, A2A, Arazzo, OAuth), each bundle describes them in its own realm's context."},"log.md":{"type":"Log","title":"Change log & provenance","description":"How this bundle was produced and verified.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"root","body":"# Change log & provenance\n\n- **2026-06-27** — Bundle created from *From API-Calling LLMs to Agent-Ready Digital Infrastructure* (Published DRAFT), the *Federated AI Research Execution Report*, and the *Engineering Agent-Ready Infrastructure* deck. 137 concepts authored across nine sections; technical claims grounded in primary standards, RFCs, arXiv papers and UK guidance (URLs from the source paper's own references where available).\n- **Conventions:** point-of-use glossary linking + reverse index; see [Linking conventions](index.md). Open items (Context Hub; UK federated-AI deployment evidence) recorded in the [evaluation](document/peer-review.md).\n- **Format:** Open Knowledge Format v0.1 (Google Cloud, 2026).\n- **2026-06-27** — Added [Context Hub](frameworks/context-hub.md) (Andrew Ng; `andrewyng/context-hub`, MIT) as the now-verified primary source for the content/skills registry layer, resolving the open item from the source paper."},"organisations/aisi.md":{"type":"Organisation","title":"AI Security Institute (AISI)","description":"UK institute; evidence on agent/MCP tool usage.","resource":"https://www.aisi.gov.uk/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"The UK AI Security Institute — its study of 177,000 MCP tools evidences the shift from observation to **action-taking** agents."},"organisations/anthropic.md":{"type":"Organisation","title":"Anthropic","description":"Introduced MCP (Nov 2024).","resource":"https://www.anthropic.com/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Introduced the [Model Context Protocol](../standards/mcp.md) in November 2024."},"organisations/cncf.md":{"type":"Organisation","title":"CNCF","description":"Stewards OPA, OpenTelemetry; confidential-computing community.","resource":"https://www.cncf.io/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"The Cloud Native Computing Foundation stewards [OPA](../standards/opa.md) (graduated) and [OpenTelemetry](../standards/opentelemetry.md)."},"organisations/dsit.md":{"type":"Organisation","title":"DSIT","description":"Department behind the Blueprint and AI Management Essentials.","resource":"https://www.gov.uk/government/organisations/department-for-science-innovation-and-technology","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"The Department for Science, Innovation and Technology — behind the [Blueprint](../uk-government/blueprint-modern-digital-government.md) and [AI Management Essentials](../uk-government/ai-management-essentials.md)."},"organisations/flower-labs.md":{"type":"Organisation","title":"Flower Labs","description":"Maintains the Flower federated AI framework.","resource":"https://flower.ai/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Maintains [Flower](../frameworks/flower.md), an open framework-agnostic federated AI platform."},"organisations/gds.md":{"type":"Organisation","title":"Government Digital Service (GDS)","description":"Author of the cross-government API standards.","resource":"https://www.gov.uk/government/organisations/government-digital-service","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Authored the [API technical and data standards](../uk-government/gds-api-standards.md) and the [UK API Catalogue](../uk-government/uk-api-catalogue.md)."},"organisations/google.md":{"type":"Organisation","title":"Google","description":"Launched A2A; TensorFlow Federated; keyboard FL.","resource":"https://ai.google/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Launched [A2A](../standards/a2a.md) (Apr 2025); authored [TensorFlow Federated](../frameworks/tensorflow-federated.md) and the [keyboard FL](../research/google-keyboard-fl.md) deployments."},"organisations/ico.md":{"type":"Organisation","title":"ICO","description":"UK regulator; AI and data-protection guidance.","resource":"https://ico.org.uk/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"The Information Commissioner's Office — its [guidance on AI and data protection](../uk-government/ico-ai-guidance.md) and [DPIA](../uk-government/dpia.md) guidance are non-optional design concerns."},"organisations/ietf.md":{"type":"Organisation","title":"IETF / RFC Editor","description":"Publishes the OAuth, DPoP, mTLS and HTTP-signature RFCs.","resource":"https://www.rfc-editor.org/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Publishes [OAuth 2.0](../standards/oauth-2-0.md), [RFC 9700](../standards/oauth-2-0-security-bcp.md), [token exchange](../standards/token-exchange.md), [mTLS-bound tokens](../standards/mtls-bound-tokens.md), [DPoP](../standards/dpop.md) and [HTTP message signatures](../standards/http-message-signatures.md)."},"organisations/index.md":{"type":"Index","title":"Organisations","description":"Bodies that author or steward the standards, frameworks and policy.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"# Organisations\n\nBodies that author or steward the standards, frameworks and policy.\n\n- [Anthropic](anthropic.md) — Introduced MCP (Nov 2024).\n- [OpenAI](openai.md) — Function calling, Structured Outputs, Agents SDK & Responses API.\n- [Google](google.md) — Launched A2A; TensorFlow Federated; keyboard FL.\n- [Linux Foundation](linux-foundation.md) — Hosts A2A, OpenAPI Initiative, CNCF, LF AI & Data.\n- [CNCF](cncf.md) — Stewards OPA, OpenTelemetry; confidential-computing community.\n- [OpenAPI Initiative](openapi-initiative.md) — Maintains OpenAPI and Arazzo.\n- [W3C](w3c.md) — Standards body for GraphQL-era web specs and PROV.\n- [IETF / RFC Editor](ietf.md) — Publishes the OAuth, DPoP, mTLS and HTTP-signature RFCs.\n- [Government Digital Service (GDS)](gds.md) — Author of the cross-government API standards.\n- [DSIT](dsit.md) — Department behind the Blueprint and AI Management Essentials.\n- [ICO](ico.md) — UK regulator; AI and data-protection guidance.\n- [NCSC](ncsc.md) — Guidelines for secure AI system development.\n- [NVIDIA](nvidia.md) — Authors NVIDIA FLARE.\n- [Flower Labs](flower-labs.md) — Maintains the Flower federated AI framework.\n- [OpenMined](openmined.md) — Open-source privacy-preserving ML community (PySyft).\n- [AI Security Institute (AISI)](aisi.md) — UK institute; evidence on agent/MCP tool usage."},"organisations/linux-foundation.md":{"type":"Organisation","title":"Linux Foundation","description":"Hosts A2A, OpenAPI Initiative, CNCF, LF AI & Data.","resource":"https://www.linuxfoundation.org/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Vendor-neutral home that took [A2A](../standards/a2a.md) under governance (2025) and hosts the [OpenAPI Initiative](openapi-initiative.md), [CNCF](cncf.md) and LF AI & Data ([Substra](../frameworks/substra.md), [OpenFL](../frameworks/openfl.md))."},"organisations/ncsc.md":{"type":"Organisation","title":"NCSC","description":"Guidelines for secure AI system development.","resource":"https://www.ncsc.gov.uk/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"The National Cyber Security Centre — its [Guidelines for secure AI system development](../uk-government/ncsc-secure-ai.md) place security across the AI lifecycle."},"organisations/nvidia.md":{"type":"Organisation","title":"NVIDIA","description":"Authors NVIDIA FLARE.","resource":"https://www.nvidia.com/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Authors [NVIDIA FLARE](../frameworks/nvidia-flare.md), a production-oriented FL SDK."},"organisations/openai.md":{"type":"Organisation","title":"OpenAI","description":"Function calling, Structured Outputs, Agents SDK & Responses API.","resource":"https://openai.com/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Documents [function calling](../glossary/function-calling.md) and [Structured Outputs](../standards/structured-outputs.md); shipped the [Agents SDK and Responses API](../frameworks/openai-agents-sdk.md) (Mar 2025).\n\n# Terms\nGlossary terms used here: [Function calling](../glossary/function-calling.md), [Structured output](../glossary/structured-output.md)."},"organisations/openapi-initiative.md":{"type":"Organisation","title":"OpenAPI Initiative","description":"Maintains OpenAPI and Arazzo.","resource":"https://www.openapis.org/about","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Maintains the [OpenAPI](../standards/openapi.md) and [Arazzo](../standards/arazzo.md) specifications under the Linux Foundation."},"organisations/openmined.md":{"type":"Organisation","title":"OpenMined","description":"Open-source privacy-preserving ML community (PySyft).","resource":"https://openmined.org/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Open-source community behind [PySyft](../frameworks/pysyft.md) for privacy-preserving remote analysis."},"organisations/w3c.md":{"type":"Organisation","title":"W3C","description":"Standards body for GraphQL-era web specs and PROV.","resource":"https://www.w3.org/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"organisations","body":"Publishes [W3C PROV](../standards/w3c-prov.md) and core web standards."},"research/agentbench.md":{"type":"Research","title":"AgentBench (2023)","description":"Multi-environment agent evaluation across 8 interactive environments.","resource":"https://arxiv.org/abs/2308.03688","timestamp":"2023-08-01T00:00:00Z","aliases":"","section":"research","body":"Evaluated agents across 8 interactive environments, revealing a large gap between open and proprietary agents — agentic competence, not API syntax."},"research/api-bank.md":{"type":"Research","title":"API-Bank (2023)","description":"Runnable evaluation exposing planning, retrieval and calling gaps.","resource":"https://arxiv.org/abs/2304.08244","timestamp":"2023-04-01T00:00:00Z","aliases":"","section":"research","body":"Benchmarked tool-augmented dialogue over runnable mock tools, exposing **planning, retrieval and calling** obstacles — not authority. Limited domains."},"research/apigen.md":{"type":"Research","title":"APIGen (2024)","description":"Pipeline for verifiable function-calling data; 3,673 executable APIs.","resource":"https://arxiv.org/abs/2406.18518","timestamp":"2024-06-01T00:00:00Z","aliases":"","section":"research","body":"A generation pipeline producing **verified, executable** function-calling data — data-centric improvement to function calling rather than a runtime control.\n\n# Terms\nGlossary terms used here: [Function calling](../glossary/function-calling.md)."},"research/bfcl.md":{"type":"Research","title":"Berkeley Function Calling Leaderboard (BFCL)","description":"Function-call accuracy: relevance, parallel and sequential calls.","resource":"https://gorilla.cs.berkeley.edu/leaderboard.html","timestamp":"2024-01-01T00:00:00Z","aliases":"","section":"research","body":"Evaluates function-call accuracy, relevance, and parallel/sequential calling over static and executable cases — function-call quality, not policy or recovery. Named in the source brief and included here for completeness."},"research/fedavg.md":{"type":"Research","title":"FedAvg — McMahan et al. (2017)","description":"Communication-efficient decentralised training by model averaging.","resource":"https://arxiv.org/abs/1602.05629","timestamp":"2017-02-01T00:00:00Z","aliases":"","section":"research","body":"Established the core FL training loop: iterative client-side training with **model averaging** dramatically reduces communication relative to synchronised SGD, while handling non-IID and unbalanced data.\n\nRelates to: [Federated learning](../federated/federated-learning.md)."},"research/google-keyboard-fl.md":{"type":"Research","title":"Google keyboard FL — Hard et al. (2018)","description":"On-device federated training for next-word prediction at production scale.","resource":"https://arxiv.org/abs/1811.03604","timestamp":"2018-11-01T00:00:00Z","aliases":"","section":"research","body":"Showed on-device federated training could match or beat server-trained baselines for next-word/emoji prediction **without uploading raw typing data** — FL's most durable cross-device production proof point.\n\nRelates to: [Cross-device vs cross-silo](../federated/cross-device-vs-cross-silo.md)."},"research/gorilla.md":{"type":"Research","title":"Gorilla & APIBench (2023)","description":"Fine-tuned LLM + document retriever; adapts to doc change, cuts hallucination.","resource":"https://arxiv.org/abs/2305.15334","timestamp":"2023-05-01T00:00:00Z","aliases":"","section":"research","body":"A genuine advance: pairing a fine-tuned model with a **document retriever**, claiming adaptation to test-time documentation change, and introducing **APIBench**. The key qualification: it improved retrieval-grounded syntax and reduced hallucinated usage but did **not** solve authorisation, stateful recovery, policy adherence or legal accountability.\n\nRelates to: [Discovery and retrieval](../stack/discovery-and-retrieval.md), [Failure taxonomy](../document/themes/failure-taxonomy.md)."},"research/index.md":{"type":"Index","title":"Research & benchmarks","description":"The tool-use and federated-learning research lineage.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"research","body":"# Research & benchmarks\n\nThe tool-use and federated-learning research lineage.\n\n- [FedAvg — McMahan et al. (2017)](fedavg.md) — Communication-efficient decentralised training by model averaging.\n- [Google keyboard FL — Hard et al. (2018)](google-keyboard-fl.md) — On-device federated training for next-word prediction at production scale.\n- [Kairouz et al. — Advances and open problems (2019)](kairouz-open-problems.md) — The field's open problems: heterogeneity, privacy, fairness, evaluation.\n- [REALM (2020)](realm.md) — Retrieval-augmented pre-training; knowledge can be retrieved, not only stored.\n- [MELLODDY (2019–2022)](melloddy.md) — Ten pharma companies trained a shared model without sharing raw data.\n- [MRKL (2022)](mrkl.md) — Neuro-symbolic modular routing to expert/knowledge modules.\n- [ReAct (2022)](react.md) — Interleaving reasoning traces with actions improves task success.\n- [Toolformer (2023)](toolformer.md) — Self-supervised learning of when and how to call tools.\n- [API-Bank (2023)](api-bank.md) — Runnable evaluation exposing planning, retrieval and calling gaps.\n- [Gorilla & APIBench (2023)](gorilla.md) — Fine-tuned LLM + document retriever; adapts to doc change, cuts hallucination.\n- [ToolLLM / ToolBench (2023)](toolllm-toolbench.md) — 16,000+ APIs; ToolLLaMA with a neural API retriever; DFSDT.\n- [AgentBench (2023)](agentbench.md) — Multi-environment agent evaluation across 8 interactive environments.\n- [Berkeley Function Calling Leaderboard (BFCL)](bfcl.md) — Function-call accuracy: relevance, parallel and sequential calls.\n- [APIGen (2024)](apigen.md) — Pipeline for verifiable function-calling data; 3,673 executable APIs.\n- [τ-bench (2024)](tau-bench.md) — Tool-Agent-User evaluation with domain policies.\n- [ToolSandbox (2024)](toolsandbox.md) — Stateful, conversational evaluation with a user simulator.\n- [ToolACE (2024)](toolace.md) — Self-evolution synthesis; 26,507 APIs; dual verification."},"research/kairouz-open-problems.md":{"type":"Research","title":"Kairouz et al. — Advances and open problems (2019)","description":"The field's open problems: heterogeneity, privacy, fairness, evaluation.","resource":"https://arxiv.org/abs/1912.04977","timestamp":"2019-12-01T00:00:00Z","aliases":"","section":"research","body":"Formalised FL's open problems — systems heterogeneity, privacy, fairness, personalisation, compression, communication efficiency, robustness and **evaluation** — the standard reference map of the field.\n\nRelates to: [Non-IID data](../federated/non-iid-data.md), [Federated evaluation](../federated/federated-evaluation.md)."},"research/melloddy.md":{"type":"Research","title":"MELLODDY (2019–2022)","description":"Ten pharma companies trained a shared model without sharing raw data.","resource":"https://www.melloddy.eu/","timestamp":"2022-01-01T00:00:00Z","aliases":"","section":"research","body":"The clearest industry-scale **cross-silo** example: ten pharmaceutical companies collaborated on a secure federated platform (AWS/Kubernetes) to train a shared drug-discovery model without sharing confidential datasets.\n\nRelates to: [Substra](../frameworks/substra.md), [Cross-device vs cross-silo](../federated/cross-device-vs-cross-silo.md)."},"research/mrkl.md":{"type":"Research","title":"MRKL (2022)","description":"Neuro-symbolic modular routing to expert/knowledge modules.","resource":"https://arxiv.org/abs/2205.00445","timestamp":"2022-05-01T00:00:00Z","aliases":"","section":"research","body":"Reframed LLM systems as **modular compositions** of language, knowledge and reasoning modules routed to expert tools — conceptual, with little quantitative evaluation."},"research/react.md":{"type":"Research","title":"ReAct (2022)","description":"Interleaving reasoning traces with actions improves task success.","resource":"https://arxiv.org/abs/2210.03629","timestamp":"2022-10-01T00:00:00Z","aliases":""
