,"section":"research","body":"Showed that **interleaving reasoning with actions** improves interpretability and long-horizon task performance (QA, ALFWorld, WebShop). Shifted the question from *can a model answer?* to *can a system reason and act?*"},"research/realm.md":{"type":"Research","title":"REALM (2020)","description":"Retrieval-augmented pre-training; knowledge can be retrieved, not only stored.","resource":"https://arxiv.org/abs/2002.08909","timestamp":"2020-02-01T00:00:00Z","aliases":"","section":"research","body":"Made the case that world knowledge should be **retrieved** rather than stored only in parameters — directly relevant to changing API docs. Not about API syntax, but the intellectual root of the discovery-and-retrieval layer.\n\nRelates to: [Discovery and retrieval](../stack/discovery-and-retrieval.md)."},"research/tau-bench.md":{"type":"Research","title":"τ-bench (2024)","description":"Tool-Agent-User evaluation with domain policies.","resource":"https://arxiv.org/abs/2406.12045","timestamp":"2024-06-01T00:00:00Z","aliases":"","section":"research","body":"Tests **reliability and policy adherence** under dynamic users with domain policies (airline, retail) — both remain weak. Evidence that policy belongs in infrastructure, not prompts.\n\nRelates to: [Policy enforcement](../stack/policy-enforcement.md)."},"research/toolace.md":{"type":"Research","title":"ToolACE (2024)","description":"Self-evolution synthesis; 26,507 APIs; dual verification.","resource":"https://arxiv.org/abs/2409.00920","timestamp":"2024-09-01T00:00:00Z","aliases":"","section":"research","body":"Self-evolving synthesis with dual verification across 26,507 APIs — high-quality synthesis lifts small models' function-calling accuracy, bounded by synthetic realism."},"research/toolformer.md":{"type":"Research","title":"Toolformer (2023)","description":"Self-supervised learning of when and how to call tools.","resource":"https://arxiv.org/abs/2302.04761","timestamp":"2023-02-01T00:00:00Z","aliases":"","section":"research","body":"Demonstrated that models can **self-teach** when to call tools and how to incorporate outputs, via self-supervision — for a fixed, small tool set."},"research/toolllm-toolbench.md":{"type":"Research","title":"ToolLLM / ToolBench (2023)","description":"16,000+ APIs; ToolLLaMA with a neural API retriever; DFSDT.","resource":"https://arxiv.org/abs/2307.16789","timestamp":"2023-07-01T00:00:00Z","aliases":"","section":"research","body":"Assembled 16,464 RapidAPI REST APIs and paired model fine-tuning with a **neural API retriever** and DFSDT search — scaling the tool space and generalising to unseen APIs, with RapidAPI dependence/instability."},"research/toolsandbox.md":{"type":"Research","title":"ToolSandbox (2024)","description":"Stateful, conversational evaluation with a user simulator.","resource":"https://arxiv.org/abs/2408.04682","timestamp":"2024-08-01T00:00:00Z","aliases":"","section":"research","body":"A **stateful** conversational benchmark with a user simulator and milestone-based trajectories — showing that state dependence and insufficient-information handling remain hard. Simulated tools only.\n\nRelates to: [Execution and orchestration](../stack/execution-and-orchestration.md)."},"sources-index.md":{"type":"Index","title":"Sources index","description":"Every source, standard, framework, paper and organisation in the bundle, with verified citations.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"root","body":"# Sources index\n\nVerified against primary or authoritative pages (accessed 27 June 2026).\n\n\n## Standards & specifications\n\n- [Agent2Agent (A2A)](standards/a2a.md) — <https://developers.googleblog.com/en/a2a-a-new-era-of-agent-interoperability/>\n- [Arazzo](standards/arazzo.md) — <https://spec.openapis.org/arazzo/latest.html>\n- [AsyncAPI](standards/asyncapi.md) — <https://www.asyncapi.com/docs/reference/specification/latest>\n- [DPoP — RFC 9449](standards/dpop.md) — <https://www.rfc-editor.org/rfc/rfc9449>\n- [GraphQL](standards/graphql.md) — <https://spec.graphql.org/October2021/>\n- [HTTP Message Signatures — RFC 9421](standards/http-message-signatures.md) — <https://www.rfc-editor.org/rfc/rfc9421>\n- [JSON Schema](standards/json-schema.md) — <https://json-schema.org/draft/2020-12>\n- [Model Context Protocol (MCP)](standards/mcp.md) — <https://modelcontextprotocol.io/specification/2025-06-18>\n- [OAuth 2.0](standards/oauth-2-0.md) — <https://www.rfc-editor.org/rfc/rfc6749>\n- [OAuth 2.0 Security BCP — RFC 9700](standards/oauth-2-0-security-bcp.md) — <https://www.rfc-editor.org/rfc/rfc9700>\n- [OAuth Token Exchange — RFC 8693](standards/token-exchange.md) — <https://www.rfc-editor.org/rfc/rfc8693>\n- [Open Policy Agent (OPA)](standards/opa.md) — <https://www.openpolicyagent.org/docs/latest/>\n- [OpenAPI](standards/openapi.md) — <https://spec.openapis.org/oas/latest.html>\n- [OpenTelemetry](standards/opentelemetry.md) — <https://opentelemetry.io/docs/concepts/observability-primer/>\n- [PKCE — RFC 7636](standards/pkce.md) — <https://www.rfc-editor.org/rfc/rfc7636>\n- [SPIFFE / SPIRE](standards/spiffe-spire.md) — <https://spiffe.io/docs/latest/spiffe-about/overview/>\n- [Structured Outputs](standards/structured-outputs.md) — <https://platform.openai.com/docs/guides/structured-outputs>\n- [W3C PROV](standards/w3c-prov.md) — <https://www.w3.org/TR/prov-overview/>\n- [Zero trust architecture (NIST SP 800-207)](standards/zero-trust.md) — <https://csrc.nist.gov/pubs/sp/800/207/final>\n- [gRPC / Protocol Buffers](standards/grpc-protobuf.md) — <https://protobuf.dev/overview/>\n- [mTLS-bound tokens — RFC 8705](standards/mtls-bound-tokens.md) — <https://www.rfc-editor.org/rfc/rfc8705>\n\n## Frameworks & middleware\n\n- [Context Hub](frameworks/context-hub.md) — <https://github.com/andrewyng/context-hub>\n- [AutoGen](frameworks/autogen.md) — <https://microsoft.github.io/autogen/stable/>\n- [FATE](frameworks/fate.md) — <https://github.com/FederatedAI/FATE>\n- [FedML / TensorOpera](frameworks/fedml.md) — <https://fedml.ai/>\n- [Flotilla](frameworks/flotilla.md)\n- [Flower](frameworks/flower.md) — <https://flower.ai/>\n- [NVIDIA FLARE](frameworks/nvidia-flare.md) — <https://nvflare.readthedocs.io/en/main/>\n- [OpenAI Agents SDK & Responses API](frameworks/openai-agents-sdk.md) — <https://openai.com/index/new-tools-for-building-agents/>\n- [OpenFL](frameworks/openfl.md) — <https://openfl.readthedocs.io/>\n- [PySyft](frameworks/pysyft.md) — <https://github.com/OpenMined/PySyft>\n- [Semantic Kernel](frameworks/semantic-kernel.md) — <https://learn.microsoft.com/en-us/semantic-kernel/overview/>\n- [Substra](frameworks/substra.md) — <https://docs.substra.org/>\n- [TensorFlow Federated](frameworks/tensorflow-federated.md) — <https://www.tensorflow.org/federated>\n\n## Research & benchmarks\n\n- [API-Bank (2023)](research/api-bank.md) — <https://arxiv.org/abs/2304.08244>\n- [APIGen (2024)](research/apigen.md) — <https://arxiv.org/abs/2406.18518>\n- [AgentBench (2023)](research/agentbench.md) — <https://arxiv.org/abs/2308.03688>\n- [Berkeley Function Calling Leaderboard (BFCL)](research/bfcl.md) — <https://gorilla.cs.berkeley.edu/leaderboard.html>\n- [FedAvg — McMahan et al. (2017)](research/fedavg.md) — <https://arxiv.org/abs/1602.05629>\n- [Google keyboard FL — Hard et al. (2018)](research/google-keyboard-fl.md) — <https://arxiv.org/abs/1811.03604>\n- [Gorilla & APIBench (2023)](research/gorilla.md) — <https://arxiv.org/abs/2305.15334>\n- [Kairouz et al. — Advances and open problems (2019)](research/kairouz-open-problems.md) — <https://arxiv.org/abs/1912.04977>\n- [MELLODDY (2019–2022)](research/melloddy.md) — <https://www.melloddy.eu/>\n- [MRKL (2022)](research/mrkl.md) — <https://arxiv.org/abs/2205.00445>\n- [REALM (2020)](research/realm.md) — <https://arxiv.org/abs/2002.08909>\n- [ReAct (2022)](research/react.md) — <https://arxiv.org/abs/2210.03629>\n- [ToolACE (2024)](research/toolace.md) — <https://arxiv.org/abs/2409.00920>\n- [ToolLLM / ToolBench (2023)](research/toolllm-toolbench.md) — <https://arxiv.org/abs/2307.16789>\n- [ToolSandbox (2024)](research/toolsandbox.md) — <https://arxiv.org/abs/2408.04682>\n- [Toolformer (2023)](research/toolformer.md) — <https://arxiv.org/abs/2302.04761>\n- [τ-bench (2024)](research/tau-bench.md) — <https://arxiv.org/abs/2406.12045>\n\n## Federated AI\n\n- [Cross-device vs cross-silo](federated/cross-device-vs-cross-silo.md)\n- [Differential privacy](federated/differential-privacy.md)\n- [Federated / confidential RAG](federated/federated-rag.md)\n- [Federated analytics](federated/federated-analytics.md)\n- [Federated evaluation](federated/federated-evaluation.md)\n- [Federated learning](federated/federated-learning.md) — <https://arxiv.org/abs/1602.05629>\n- [Federated unlearning](federated/federated-unlearning.md)\n- [Homomorphic encryption & MPC](federated/homomorphic-encryption-mpc.md)\n- [Hub-and-spoke vs hierarchical coordination](federated/hub-and-spoke-vs-hierarchical.md)\n- [Membership inference & gradient leakage](federated/membership-inference.md)\n- [Model poisoning & backdoors](federated/model-poisoning-backdoors.md)\n- [Multi-dimensional evaluation rubric](federated/evaluation-rubric.md)\n- [Non-IID data](federated/non-iid-data.md)\n- [Secure aggregation](federated/secure-aggregation.md) — <https://arxiv.org/abs/1611.04482>\n- [Trusted execution environments (TEEs)](federated/trusted-execution-environments.md) — <https://confidentialcomputing.io/>\n\n## UK government\n\n- [AI Management Essentials](uk-government/ai-management-essentials.md) — <https://www.gov.uk/government/consultations/ai-management-essentials-tool>\n- [Algorithmic Transparency Recording Standard (ATRS)](uk-government/atrs.md) — <https://www.gov.uk/government/collections/algorithmic-transparency-recording-standard-hub>\n- [Blueprint for modern digital government](uk-government/blueprint-modern-digital-government.md) — <https://www.gov.uk/government/publications/a-blueprint-for-modern-digital-government>\n- [Data Ethics Framework](uk-government/data-ethics-framework.md) — <https://www.gov.uk/government/publications/data-ethics-framework>\n- [Data Protection Impact Assessment (DPIA)](uk-government/dpia.md) — <https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/accountability-and-governance/data-protection-impact-assessments-dpias/>\n- [GDS API technical and data standards](uk-government/gds-api-standards.md) — <https://www.gov.uk/guidance/gds-api-technical-and-data-standards>\n- [GOV.UK API Catalogue](uk-government/uk-api-catalogue.md) — <https://www.api.gov.uk/>\n- [ICO guidance on AI and data protection](uk-government/ico-ai-guidance.md) — <https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/artificial-intelligence/guidance-on-ai-and-data-protection/>\n- [NCSC Guidelines for secure AI system development](uk-government/ncsc-secure-ai.md) — <https://www.ncsc.gov.uk/collection/guidelines-secure-ai-system-development>\n- [State of digital government review](uk-government/state-of-digital-government.md) — <https://www.gov.uk/government/publications/state-of-digital-government-review>\n\n## Organisations\n\n- [AI Security Institute (AISI)](organisations/aisi.md) — <https://www.aisi.gov.uk/>\n- [Anthropic](organisations/anthropic.md) — <https://www.anthropic.com/>\n- [CNCF](organisations/cncf.md) — <https://www.cncf.io/>\n- [DSIT](organisations/dsit.md) — <https://www.gov.uk/government/organisations/department-for-science-innovation-and-technology>\n- [Flower Labs](organisations/flower-labs.md) — <https://flower.ai/>\n- [Google](organisations/google.md) — <https://ai.google/>\n- [Government Digital Service (GDS)](organisations/gds.md) — <https://www.gov.uk/government/organisations/government-digital-service>\n- [ICO](organisations/ico.md) — <https://ico.org.uk/>\n- [IETF / RFC Editor](organisations/ietf.md) — <https://www.rfc-editor.org/>\n- [Linux Foundation](organisations/linux-foundation.md) — <https://www.linuxfoundation.org/>\n- [NCSC](organisations/ncsc.md) — <https://www.ncsc.gov.uk/>\n- [NVIDIA](organisations/nvidia.md) — <https://www.nvidia.com/>\n- [OpenAI](organisations/openai.md) — <https://openai.com/>\n- [OpenAPI Initiative](organisations/openapi-initiative.md) — <https://www.openapis.org/about>\n- [OpenMined](organisations/openmined.md) — <https://openmined.org/>\n- [W3C](organisations/w3c.md) — <https://www.w3.org/>"},"stack/contracts-and-interfaces.md":{"type":"Stack layer","title":"Contracts and interfaces","description":"Authoritative, machine-readable descriptions of what a capability is and how to call it.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Role in the stack\nThe base layer: formal, machine-readable interface contracts. [OpenAPI](../standards/openapi.md) describes HTTP APIs; [AsyncAPI](../standards/asyncapi.md) describes message-driven ones; [GraphQL](../standards/graphql.md) exposes a typed query layer; [gRPC/protobuf](../standards/grpc-protobuf.md) define typed RPC; [JSON Schema](../standards/json-schema.md) validates arguments; [Arazzo](../standards/arazzo.md) describes multi-step workflows over them.\n\n# Principle\nA schema-valid call is **not** the same as a valid or authorised action — contracts give form, not authority or correctness. Prefer authoritative published contracts over inferred schemas.\n\nRelates to: [Understanding and grounding](understanding-and-grounding.md), [Control plane](control-plane.md)."},"stack/control-plane.md":{"type":"Architecture","title":"The discovery-to-governance control plane","description":"The end-to-end lifecycle that turns a tool-calling model into governed agent execution.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# What it is\nThe architecture that emerges across the evidence is a **discovery-to-governance lifecycle**: a user expresses intent; the runtime retrieves current capability descriptions; the model selects tools and binds arguments against formal schemas; an authorisation layer establishes *who or what* is acting, for whom and with which limits; an execution substrate handles retries, timeouts and compensation; and an evidence layer records provenance, traces, policy decisions and consents.\n\n# Why it matters\nAPI-calling is only **one layer** of an agent-capable stack. Reliable deployment depends on capabilities outside the model: [contracts](contracts-and-interfaces.md), [discovery](discovery-and-retrieval.md), [identity](identity-and-authorisation.md), [execution](execution-and-orchestration.md), [policy](policy-enforcement.md) and [observability/provenance](observability-and-provenance.md). None substitutes for the others.\n\nRelates to: [Agent-ready, not agent-trusting](../document/themes/agent-ready-not-agent-trusting.md), [The federation layer](federation-layer.md).\n\n# Terms\nGlossary terms used here: [Compensation](../glossary/compensation.md), [Provenance](../glossary/provenance.md)."},"stack/discovery-and-retrieval.md":{"type":"Stack layer","title":"Discovery and current-context retrieval","description":"Finding that a capability exists, and selecting a small candidate set at inference time.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Role in the stack\nDiscovery should be a **first-class runtime capability**, not a side effect of stuffing all tools into one prompt. Discovery finds *that* a capability exists (catalogues, OpenAPI docs, A2A [Agent Cards](../glossary/agent-card.md), protocol registries, and content/skills registries such as [Context Hub](../frameworks/context-hub.md)); retrieval selects a small candidate set from a large inventory at inference time.\n\n# Evidence\n[Gorilla](../research/gorilla.md) + a retriever and [ToolLLM](../research/toolllm-toolbench.md) + a neural retriever both address the scaling problem when the tool set is too large for naïve prompting. Retrieval narrows the search space and improves freshness — necessary but insufficient for trustworthy action.\n\nRelates to: [UK API Catalogue](../uk-government/uk-api-catalogue.md), [Contracts and interfaces](contracts-and-interfaces.md).\n\n# Terms\nGlossary terms used here: [Agent Card](../glossary/agent-card.md)."},"stack/execution-and-orchestration.md":{"type":"Stack layer","title":"Execution and orchestration","description":"Durable, stateful multi-step execution owned by the runtime, not the prompt.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Role in the stack\nSingle-call tool use is insufficient for many tasks. The **runtime, not the model**, should own retries, backoff, [idempotency](../glossary/idempotency.md), timeout budgets, batching, circuit breaking, webhook correlation and [compensation](../glossary/compensation.md). Where workflows matter, describe them explicitly with [Arazzo](../standards/arazzo.md) rather than leaving the model to infer every step.\n\n# Evidence\n[ToolSandbox](../research/toolsandbox.md) and [τ-bench](../research/tau-bench.md) show state dependence and consistency remain weak points — which is exactly why orchestration belongs in infrastructure.\n\nRelates to: [Workflow engine](../glossary/workflow-engine.md), [OpenAI Agents SDK](../frameworks/openai-agents-sdk.md).\n\n# Terms\nGlossary terms used here: [Compensation](../glossary/compensation.md), [Idempotency](../glossary/idempotency.md), [Tool use](../glossary/tool-use.md), [Workflow engine](../glossary/workflow-engine.md)."},"stack/federation-layer.md":{"type":"Architecture","title":"The federation layer (the missing plane)","description":"The collaborative-learning plane that lets institutions improve a shared model without centralising data.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# The missing layer\nMost AI stacks combine three layers — data platforms, application workflows, and model inference — but lack a **federation layer** that coordinates model training, evaluation and analytics *across organisational boundaries*. [MCP](../standards/mcp.md) and [Arazzo](../standards/arazzo.md) help with interoperability at inference and workflow time; [federated learning](../federated/federated-learning.md) frameworks solve interoperability at **optimisation and governance** time.\n\n# Why it matters for public services\nCouncils, NHS bodies and ALBs often need more than a tool-calling assistant: a controlled way for multiple data holders to contribute to shared intelligence without merging raw data — implying client selection, aggregation, privacy controls, node identity, auditability and federation governance.\n\nRelates to: [Flower](../frameworks/flower.md), [Cross-device vs cross-silo](../federated/cross-device-vs-cross-silo.md), [The missing collaborative-learning layer](../document/themes/missing-collaborative-learning-layer.md).\n\n# Terms\nGlossary terms used here: [Audit trail](../glossary/audit-trail.md)."},"stack/identity-and-authorisation.md":{"type":"Stack layer","title":"Identity and authorisation","description":"Establishing who or what is acting, for whom, for what purpose, with which limits.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Role in the stack\nThe control plane must decide *whether*, *in whose name* and *under what constraints* a tool may be called — the model knowing *how* to call it is not enough. An agent runtime should almost never hold a single broad ambient credential; it should hold short-lived, narrowly-scoped, audience- and purpose-bound, preferably [sender-constrained](../glossary/sender-constrained-token.md) credentials.\n\n# Two questions\n[OAuth 2.0](../standards/oauth-2-0.md) (with [RFC 9700](../standards/oauth-2-0-security-bcp.md), [token exchange](../standards/token-exchange.md), [mTLS-bound tokens](../standards/mtls-bound-tokens.md), [DPoP](../standards/dpop.md)) answers *on whose behalf*; [SPIFFE/SPIRE](../standards/spiffe-spire.md) [workload identity](../glossary/workload-identity.md) answers *what is calling*; [zero trust](../standards/zero-trust.md) removes implicit network trust.\n\nRelates to: [Agent-ready, not agent-trusting](../document/themes/agent-ready-not-agent-trusting.md).\n\n# Terms\nGlossary terms used here: [Workload identity](../glossary/workload-identity.md)."},"stack/index.md":{"type":"Index","title":"Stack layers","description":"The agent-ready vertical stack: from contracts to evidence.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Stack layers\n\nThe agent-ready vertical stack: from contracts to evidence.\n\n- [The discovery-to-governance control plane](control-plane.md) — The end-to-end lifecycle that turns a tool-calling model into governed agent execution.\n- [Contracts and interfaces](contracts-and-interfaces.md) — Authoritative, machine-readable descriptions of what a capability is and how to call it.\n- [Discovery and current-context retrieval](discovery-and-retrieval.md) — Finding that a capability exists, and selecting a small candidate set at inference time.\n- [Understanding and grounding](understanding-and-grounding.md) — Schema grounding vs semantic grounding: matching types vs matching intent.\n- [Identity and authorisation](identity-and-authorisation.md) — Establishing who or what is acting, for whom, for what purpose, with which limits.\n- [Execution and orchestration](execution-and-orchestration.md) — Durable, stateful multi-step execution owned by the runtime, not the prompt.\n- [Policy enforcement](policy-enforcement.md) — Decoupling policy decisions from enforcement points across the stack.\n- [Observability and provenance](observability-and-provenance.md) — The evidence layer: traces, metrics, logs and an interoperable provenance graph.\n- [The federation layer (the missing plane)](federation-layer.md) — The collaborative-learning plane that lets institutions improve a shared model without centralising data."},"stack/observability-and-provenance.md":{"type":"Stack layer","title":"Observability and provenance","description":"The evidence layer: traces, metrics, logs and an interoperable provenance graph.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Role in the stack\nThe evidence layer. [OpenTelemetry](../standards/opentelemetry.md) provides traces, metrics and logs; [W3C PROV](../standards/w3c-prov.md) provides an interoperable model of the entities, activities and agents that produced an outcome. Together they imply a **minimum evidence bundle** for agentic execution: intent, retrieved-context version, tool-selection rationale, delegated authority, execution trace, result and provenance graph.\n\n# Why it is load-bearing\nWhen an agent performs a lawful-but-undesired action, the question shifts from *what did the model know?* to *which principal delegated authority, under which policy, using which contract version, with what recorded consent and audit trail?*\n\nRelates to: [Provenance](../glossary/provenance.md), [Audit trail](../glossary/audit-trail.md), [UK public-sector implications](../document/themes/uk-public-sector-implications.md).\n\n# Terms\nGlossary terms used here: [Audit trail](../glossary/audit-trail.md), [Consent](../glossary/consent.md), [Provenance](../glossary/provenance.md)."},"stack/policy-enforcement.md":{"type":"Stack layer","title":"Policy enforcement","description":"Decoupling policy decisions from enforcement points across the stack.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Role in the stack\nGuardrails belong in infrastructure, decoupled from model-generated reasoning. [Policy-as-code](../glossary/policy-as-code.md) — notably [OPA](../standards/opa.md) — separates the *decision* from the *enforcement point* and can run across microservices, API gateways, CI/CD and Kubernetes. Log policy decisions independently of the model's rationale.\n\nRelates to: [Identity and authorisation](identity-and-authorisation.md), [Observability and provenance](observability-and-provenance.md).\n\n# Terms\nGlossary terms used here: [Policy-as-code](../glossary/policy-as-code.md), [Provenance](../glossary/provenance.md)."},"stack/understanding-and-grounding.md":{"type":"Stack layer","title":"Understanding and grounding","description":"Schema grounding vs semantic grounding: matching types vs matching intent.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"stack","body":"# Role in the stack\nSchema grounding asks whether fields and types match a formal contract; **semantic grounding** asks whether the model mapped user intent to the right operation, entity and parameters. A call can be schema-valid yet semantically wrong, policy-violating or goal-failing.\n\n# Practice\nA hierarchy for schema extraction: first authoritative published contracts; then introspection / generated descriptors ([GraphQL](../standards/graphql.md) introspection, .proto); last resort, inferred schema from examples — useful for bootstrapping but not ground truth.\n\nRelates to: [Failure taxonomy](../document/themes/failure-taxonomy.md), [Contracts and interfaces](contracts-and-interfaces.md).\n\n# Terms\nGlossary terms used here: [Schema grounding](../glossary/schema-grounding.md), [Semantic grounding](../glossary/semantic-grounding.md)."},"standards/a2a.md":{"type":"Specification","title":"Agent2Agent (A2A)","description":"Agent-to-agent protocol: capability discovery, delegation, long-running tasks, streaming.","resource":"https://developers.googleblog.com/en/a2a-a-new-era-of-agent-interoperability/","timestamp":"2025-06-23T00:00:00Z","aliases":"","section":"standards","body":"Launched by [Google](../organisations/google.md) in April 2025 and donated to the [Linux Foundation](../organisations/linux-foundation.md) mid-2025. Uses JSON [Agent Cards](../glossary/agent-card.md) for capability discovery, with long-running tasks, streaming and enterprise auth. A2A states explicitly that it and MCP address different problems.\n\n# Terms\nGlossary terms used here: [Agent Card](../glossary/agent-card.md)."},"standards/arazzo.md":{"type":"Specification","title":"Arazzo","description":"Machine-readable workflow narratives over API descriptions.","resource":"https://spec.openapis.org/arazzo/latest.html","timestamp":"2026-04-15T00:00:00Z","aliases":"","section":"standards","body":"Defines sequences of calls, dependencies, async coordination and success/failure actions — the bridge from single-call tool use to governed multi-step execution. v1.1.0 (2026) added AsyncAPI support. New and still early in tooling maturity; depends on the underlying [OpenAPI](openapi.md)/[AsyncAPI](asyncapi.md) descriptions.\n\n# Terms\nGlossary terms used here: [Tool use](../glossary/tool-use.md)."},"standards/asyncapi.md":{"type":"Specification","title":"AsyncAPI","description":"Protocol-agnostic description of channels, operations and messages.","resource":"https://www.asyncapi.com/docs/reference/specification/latest","timestamp":"2026-01-31T00:00:00Z","aliases":"","section":"standards","body":"Describes message-driven APIs across Kafka, MQTT, AMQP, WebSockets and more — channels, operations and protocol bindings. Strong for event-driven agents and subscriptions; less mature ecosystem than OpenAPI for enterprise design governance."},"standards/dpop.md":{"type":"Specification","title":"DPoP — RFC 9449","description":"Application-layer sender-constraining without mutual TLS.","resource":"https://www.rfc-editor.org/rfc/rfc9449","timestamp":"2023-09-01T00:00:00Z","aliases":"","section":"standards","body":"Demonstrating Proof-of-Possession sender-constrains tokens at the application layer, mitigating replay of stolen tokens. Strong for browser/mobile or heterogeneous clients; still maturing in many stacks.\n\n# Terms\nGlossary terms used here: [Sender-constrained token](../glossary/sender-constrained-token.md)."},"standards/graphql.md":{"type":"Specification","title":"GraphQL","description":"Typed query language with introspection and client-specified responses.","resource":"https://spec.graphql.org/October2021/","timestamp":"2021-10-01T00:00:00Z","aliases":"","section":"standards","body":"Strong typing, introspection and reduced over-fetching make it useful where agents need flexible reads. Mutation side-effects, pagination and auth boundaries are often under-specified relative to a task agent's needs."},"standards/grpc-protobuf.md":{"type":"Specification","title":"gRPC / Protocol Buffers","description":"Typed RPC and efficient binary serialisation with generated stubs.","resource":"https://protobuf.dev/overview/","timestamp":"2016-01-01T00:00:00Z","aliases":"","section":"standards","body":"A `.proto` IDL, generated stubs, efficient binary encoding and cross-language compatibility. Strong typing helps runtime adapters and service-to-service execution; poorer human readability, and protobuf is not itself a formal standards-body standard; external discovery often needs gateway or reflection support.\n\n# Terms\nGlossary terms used here: [API gateway](../glossary/api-gateway.md)."},"standards/http-message-signatures.md":{"type":"Specification","title":"HTTP Message Signatures — RFC 9421","description":"End-to-end integrity and authenticity across intermediaries.","resource":"https://www.rfc-editor.org/rfc/rfc9421","timestamp":"2024-02-01T00:00:00Z","aliases":"","section":"standards","body":"Protects specific message components even through proxies and transformations. Useful for high-integrity requests, webhooks and regulated submission flows; not a full auth story on its own."},"standards/index.md":{"type":"Index","title":"Standards & specifications","description":"Specs, protocols, identity, policy and observability — verified against primary sources.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"standards","body":"# Standards & specifications\n\nSpecs, protocols, identity, policy and observability — verified against primary sources.\n\n- [OAuth 2.0](oauth-2-0.md) — Delegated, scoped access to an HTTP service without sharing credentials.\n- [W3C PROV](w3c-prov.md) — Interoperable model of provenance: entities, activities, agents.\n- [PKCE — RFC 7636](pkce.md) — Proof Key for Code Exchange; protects auth-code flows from interception.\n- [gRPC / Protocol Buffers](grpc-protobuf.md) — Typed RPC and efficient binary serialisation with generated stubs.\n- [OAuth Token Exchange — RFC 8693](token-exchange.md) — Narrowing or translating authority for downstream services.\n- [mTLS-bound tokens — RFC 8705](mtls-bound-tokens.md) — Sender-constrains tokens to a client via mutual TLS.\n- [Zero trust architecture (NIST SP 800-207)](zero-trust.md) — No implicit trust based on network location.\n- [JSON Schema](json-schema.md) — Validation vocabulary; underpins strict tool arguments and structured output.\n- [GraphQL](graphql.md) — Typed query language with introspection and client-specified responses.\n- [DPoP — RFC 9449](dpop.md) — Application-layer sender-constraining without mutual TLS.\n- [HTTP Message Signatures — RFC 9421](http-message-signatures.md) — End-to-end integrity and authenticity across intermediaries.\n- [Structured Outputs](structured-outputs.md) — Constraining model output to conform to a supplied schema.\n- [Model Context Protocol (MCP)](mcp.md) — Agent-to-tool protocol: hosts, clients, servers, tools, resources, prompts over JSON-RPC.\n- [OAuth 2.0 Security BCP — RFC 9700](oauth-2-0-security-bcp.md) — Current best practice; deprecates insecure OAuth modes.\n- [Agent2Agent (A2A)](a2a.md) — Agent-to-agent protocol: capability discovery, delegation, long-running tasks, streaming.\n- [OpenAPI](openapi.md) — HTTP API contracts: ops, schemas, security metadata; machine- and human-readable.\n- [AsyncAPI](asyncapi.md) — Protocol-agnostic description of channels, operations and messages.\n- [Arazzo](arazzo.md) — Machine-readable workflow narratives over API descriptions.\n- [SPIFFE / SPIRE](spiffe-spire.md) — Workload identity and attestation for software systems.\n- [Open Policy Agent (OPA)](opa.md) — Policy-as-code: decoupled decisions across the stack.\n- [OpenTelemetry](opentelemetry.md) — Traces, metrics and logs for end-to-end observability."},"standards/json-schema.md":{"type":"Specification","title":"JSON Schema","description":"Validation vocabulary; underpins strict tool arguments and structured output.","resource":"https://json-schema.org/draft/2020-12","timestamp":"2020-12-01T00:00:00Z","aliases":"","section":"standards","body":"Validation, annotations, dynamic references and meta-schemas. Excellent for strict argument validation and [structured output](../glossary/structured-output.md); does not itself define transport, operations or auth. Modern vendor tool APIs consume JSON Schema directly.\n\n# Terms\nGlossary terms used here: [Structured output](../glossary/structured-output.md)."},"standards/mcp.md":{"type":"Specification","title":"Model Context Protocol (MCP)","description":"Agent-to-tool protocol: hosts, clients, servers, tools, resources, prompts over JSON-RPC.","resource":"https://modelcontextprotocol.io/specification/2025-06-18","timestamp":"2024-11-25T00:00:00Z","aliases":"","section":"standards","body":"Introduced by [Anthropic](../organisations/anthropic.md) in November 2024; standardises agent-to-tool interaction over JSON-RPC, exposing tools, resources and prompts with explicit consent expectations. Its security section requires user consent for data exposure, tool invocation and sampling, while acknowledging it cannot enforce those principles alone; it does not provide authoritative registry curation — that registry role is filled by a content/skills registry such as [Context Hub](../frameworks/context-hub.md).\n\n# Terms\nGlossary terms used here: [Consent](../glossary/consent.md)."},"standards/mtls-bound-tokens.md":{"type":"Specification","title":"mTLS-bound tokens — RFC 8705","description":"Sender-constrains tokens to a client via mutual TLS.","resource":"https://www.rfc-editor.org/rfc/rfc8705","timestamp":"2020-02-01T00:00:00Z","aliases":"","section":"standards","body":"Strong sender constraint; good for confidential clients and service traffic. Operationally heavier (certificates, client auth). Strong for backend agents and high-trust enterprise environments."},"standards/oauth-2-0-security-bcp.md":{"type":"Specification","title":"OAuth 2.0 Security BCP — RFC 9700","description":"Current best practice; deprecates insecure OAuth modes.","resource":"https://www.rfc-editor.org/rfc/rfc9700","timestamp":"2025-01-01T00:00:00Z","aliases":"","section":"standards","body":"Updates the OAuth threat model and security advice and deprecates modes now considered insecure. Underpins the move from bearer access toward demonstrable, sender-constrained authority.\n\n# Terms\nGlossary terms used here: [Bearer token](../glossary/bearer-token.md)."},"standards/oauth-2-0.md":{"type":"Specification","title":"OAuth 2.0","description":"Delegated, scoped access to an HTTP service without sharing credentials.","resource":"https://www.rfc-editor.org/rfc/rfc6749","timestamp":"2012-10-01T00:00:00Z","aliases":"","section":"standards","body":"Grants limited access on behalf of a user or in its own right. Bearer tokens are vulnerable because possession is enough; current practice (see [RFC 9700](oauth-2-0-security-bcp.md), [PKCE](pkce.md), [token exchange](token-exchange.md), [mTLS-bound tokens](mtls-bound-tokens.md), [DPoP](dpop.md)) narrows, binds and sender-constrains authority.\n\n# Terms\nGlossary terms used here: [Bearer token](../glossary/bearer-token.md)."},"standards/opa.md":{"type":"Specification","title":"Open Policy Agent (OPA)","description":"Policy-as-code: decoupled decisions across the stack.","resource":"https://www.openpolicyagent.org/docs/latest/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"standards","body":"A CNCF-graduated project that decouples policy *decisions* from *enforcement* across microservices, API gateways, CI/CD and Kubernetes, with policy testing support. Provides runtime guardrails and admission control; does not issue identity or provide observability."},"standards/openapi.md":{"type":"Specification","title":"OpenAPI","description":"HTTP API contracts: ops, schemas, security metadata; machine- and human-readable.","resource":"https://spec.openapis.org/oas/latest.html","timestamp":"2025-09-19T00:00:00Z","aliases":"","section":"standards","body":"Standard, language-agnostic description of HTTP APIs — request/response schemas and security metadata. Strong for discovery, codegen, validation, linting and tool-calling over REST; [GDS](../uk-government/gds-api-standards.md) recommends producing an OpenAPI document *first*. Weak for event choreography and end-to-end workflow without add-ons such as [Arazzo](arazzo.md)."},"standards/opentelemetry.md":{"type":"Specification","title":"OpenTelemetry","description":"Traces, metrics and logs for end-to-end observability.","resource":"https://opentelemetry.io/docs/concepts/observability-primer/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"standards","body":"A widely standardised instrumentation approach (CNCF) for tracing agent decisions and tool hops end-to-end. Supports operational diagnosis once agents are live; does not make decisions or enforce."},"standards/pkce.md":{"type":"Specification","title":"PKCE — RFC 7636","description":"Proof Key for Code Exchange; protects auth-code flows from interception.","resource":"https://www.rfc-editor.org/rfc/rfc7636","timestamp":"2015-09-01T00:00:00Z","aliases":"","section":"standards","body":"Better current practice for user-present (browser/native) OAuth flows; still usually bearer unless [sender-constrained](../glossary/sender-constrained-token.md). Suitable where a human user is present and consenting.\n\n# Terms\nGlossary terms used here: [Bearer token](../glossary/bearer-token.md)."},"standards/spiffe-spire.md":{"type":"Specification","title":"SPIFFE / SPIRE","description":"Workload identity and attestation for software systems.","resource":"https://spiffe.io/docs/latest/spiffe-about/overview/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"standards","body":"SPIFFE defines open standards for identifying software systems in dynamic environments; SPIRE issues [workload identities](../glossary/workload-identity.md) after node and workload attestation. A complement to OAuth, not an alternative: workload identity establishes *what* is calling; OAuth establishes *on whose behalf*. Essential for service meshes and agent runtimes.\n\n# Terms\nGlossary terms used here: [Attestation](../glossary/attestation.md), [Workload identity](../glossary/workload-identity.md)."},"standards/structured-outputs.md":{"type":"Specification","title":"Structured Outputs","description":"Constraining model output to conform to a supplied schema.","resource":"https://platform.openai.com/docs/guides/structured-outputs","timestamp":"2024-08-06T00:00:00Z","aliases":"","section":"standards","body":"Guarantees that model output conforms to a supplied [JSON Schema](json-schema.md) — form, not authority or correctness. Distinct from [function calling](../glossary/function-calling.md): schema-valid JSON is not the same as a valid or authorised action.\n\n# Terms\nGlossary terms used here: [Function calling](../glossary/function-calling.md)."},"standards/token-exchange.md":{"type":"Specification","title":"OAuth Token Exchange — RFC 8693","description":"Narrowing or translating authority for downstream services.","resource":"https://www.rfc-editor.org/rfc/rfc8693","timestamp":"2020-01-01T00:00:00Z","aliases":"","section":"standards","body":"Supports narrowing audience/scope and service-to-service delegation — strong for planner-executor architectures and downstream APIs. Adds trust and STS design complexity."},"standards/w3c-prov.md":{"type":"Specification","title":"W3C PROV","description":"Interoperable model of provenance: entities, activities, agents.","resource":"https://www.w3.org/TR/prov-overview/","timestamp":"2013-04-30T00:00:00Z","aliases":"","section":"standards","body":"An interoperable model of the entities, activities and agents involved in producing data or an outcome — the basis for a provenance graph in the [evidence layer](../stack/observability-and-provenance.md).\n\n# Terms\nGlossary terms used here: [Provenance](../glossary/provenance.md)."},"standards/zero-trust.md":{"type":"Specification","title":"Zero trust architecture (NIST SP 800-207)","description":"No implicit trust based on network location.","resource":"https://csrc.nist.gov/pubs/sp/800/207/final","timestamp":"2020-08-01T00:00:00Z","aliases":"","section":"standards","body":"Eliminates implicit trust derived from network position; every request is authenticated, authorised and continuously evaluated. A foundation for agent runtimes, paired with [workload identity](spiffe-spire.md) and [sender-constrained](../glossary/sender-constrained-token.md) credentials.\n\n# Terms\nGlossary terms used here: [Workload identity](../glossary/workload-identity.md)."},"uk-government/ai-management-essentials.md":{"type":"Government Publication","title":"AI Management Essentials","description":"A baseline self-assessment for responsible AI management.","resource":"https://www.gov.uk/government/consultations/ai-management-essentials-tool","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"A DSIT tool offering a baseline of responsible AI-management practices for organisations — relevant to assuring agentic and federated deployments."},"uk-government/atrs.md":{"type":"Government Publication","title":"Algorithmic Transparency Recording Standard (ATRS)","description":"Mandatory transparency records for public-effect algorithmic tools.","resource":"https://www.gov.uk/government/collections/algorithmic-transparency-recording-standard-hub","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"Mandatory across central government and relevant ALBs for tools that significantly influence decisions with public effect or interact with the public; recommended across the wider public sector. The accountability obligation an agent runtime must satisfy at the system boundary."},"uk-government/blueprint-modern-digital-government.md":{"type":"Government Publication","title":"Blueprint for modern digital government","description":"A Digital Backbone, open APIs and a stronger digital centre.","resource":"https://www.gov.uk/government/publications/a-blueprint-for-modern-digital-government","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"Argues for a stronger digital centre, a standard set of APIs and events, and open APIs by default — the policy frame into which agent-ready infrastructure should fit."},"uk-government/data-ethics-framework.md":{"type":"Government Publication","title":"Data Ethics Framework","description":"Principles for responsible public-sector data and AI use.","resource":"https://www.gov.uk/government/publications/data-ethics-framework","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"Guides the responsible development, procurement and use of data and AI in the public sector — a baseline for federated and agentic deployments."},"uk-government/dpia.md":{"type":"Government Publication","title":"Data Protection Impact Assessment (DPIA)","description":"A pre-deployment gate for high-risk processing.","resource":"https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/accountability-and-governance/data-protection-impact-assessments-dpias/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"High-risk processing requires a DPIA before go-live — a mandatory gate for federated or agentic systems touching personal data."},"uk-government/gds-api-standards.md":{"type":"Government Publication","title":"GDS API technical and data standards","description":"REST-default, OpenAPI-first; auth, sandboxes, GDPR by design.","resource":"https://www.gov.uk/guidance/gds-api-technical-and-data-standards","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"First published Feb 2018: produce an [OpenAPI](../standards/openapi.md) document before coding, lint, generate docs, create test stubs, require authentication, prefer OAuth 2.0, and ensure sandboxes contain no real personal data. Directly applicable to agent readiness: a poorly-described estate will be worse for agents than for humans."},"uk-government/ico-ai-guidance.md":{"type":"Government Publication","title":"ICO guidance on AI and data protection","description":"Accountability, transparency, lawfulness, fairness, security, minimisation.","resource":"https://ico.org.uk/for-organisations/uk-gdpr-guidance-and-resources/artificial-intelligence/guidance-on-ai-and-data-protection/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"Frames accountability, transparency, lawfulness, fairness, security, data minimisation and individual rights as non-optional design concerns for AI — including federated systems."},"uk-government/index.md":{"type":"Index","title":"UK government","description":"UK policy, standards, guidance and registries.","resource":"","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"# UK government\n\nUK policy, standards, guidance and registries.\n\n- [GDS API technical and data standards](gds-api-standards.md) — REST-default, OpenAPI-first; auth, sandboxes, GDPR by design.\n- [GOV.UK API Catalogue](uk-api-catalogue.md) — Check existing catalogues before building a new API.\n- [State of digital government review](state-of-digital-government.md) — Public-sector transformation constrained by technology debt and fragmentation.\n- [Blueprint for modern digital government](blueprint-modern-digital-government.md) — A Digital Backbone, open APIs and a stronger digital centre.\n- [Data Ethics Framework](data-ethics-framework.md) — Principles for responsible public-sector data and AI use.\n- [ICO guidance on AI and data protection](ico-ai-guidance.md) — Accountability, transparency, lawfulness, fairness, security, minimisation.\n- [NCSC Guidelines for secure AI system development](ncsc-secure-ai.md) — Security across design, development, deployment and operation.\n- [Algorithmic Transparency Recording Standard (ATRS)](atrs.md) — Mandatory transparency records for public-effect algorithmic tools.\n- [AI Management Essentials](ai-management-essentials.md) — A baseline self-assessment for responsible AI management.\n- [Data Protection Impact Assessment (DPIA)](dpia.md) — A pre-deployment gate for high-risk processing."},"uk-government/ncsc-secure-ai.md":{"type":"Government Publication","title":"NCSC Guidelines for secure AI system development","description":"Security across design, development, deployment and operation.","resource":"https://www.ncsc.gov.uk/collection/guidelines-secure-ai-system-development","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"Places security across the full AI lifecycle — secure design, development, deployment and operation — treating AI systems as security systems by default."},"uk-government/state-of-digital-government.md":{"type":"Government Publication","title":"State of digital government review","description":"Public-sector transformation constrained by technology debt and fragmentation.","resource":"https://www.gov.uk/government/publications/state-of-digital-government-review","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"Argues the bottleneck is **infrastructural and organisational**, not just model quality — aligning with the agent-research evidence that the substrate, not the model, is the constraint."},"uk-government/uk-api-catalogue.md":{"type":"Government Publication","title":"GOV.UK API Catalogue","description":"Check existing catalogues before building a new API.","resource":"https://www.api.gov.uk/","timestamp":"2026-06-27T00:00:00Z","aliases":"","section":"uk-government","body":"GDS recommends checking internal catalogues and the cross-government API Catalogue before building anything new — discovery as a first-class step."}},"edges":[["document/index.md","document/overview.md"],["document/index.md","document/peer-review.md"],["document/index.md","document/sources/index.md"],["document/index.md","document/themes/index.md"],["document/overview.md","document/sources/agent-ready-infrastructure-paper.md"],["document/overview.md","document/sources/engineering-deck.md"],["document/overview.md","document/sources/federated-ai-report.md"],["document/overview.md","glossary/provenance.md"],["document/overview.md","sources-index.md"],["document/overview.md","stack/control-plane.md"],["document/overview.md","stack/federation-layer.md"],["document/peer-review.md","frameworks/context-hub.md"],["document/peer-review.md","glossary/agent-skill.md"],["document/peer-review.md","index.md"],["document/peer-review.md","standards/a2a.md"],["document/peer-review.md","standards/mcp.md"],["document/sources/agent-ready-infrastructure-paper.md","document/themes/discovery-to-governance.md"],["document/sources/agent-ready-infrastructure-paper.md","document/themes/failure-taxonomy.md"],["document/sources/engineering-deck.md","document/sources/agent-ready-infrastructure-paper.md"],["document/sources/federated-ai-report.md","document/themes/missing-collaborative-learning-layer.md"],["document/sources/index.md","document/sources/agent-ready-infrastructure-paper.md"],["document/sources/index.md","document/sources/engineering-deck.md"],["document/sources/index.md","document/sources/federated-ai-report.md"],["document/themes/agent-ready-not-agent-trusting.md","glo function candidates(){const out=[];if(sel){focusSet.forEach(id=>{const n=M[id];if(n!==sel&&n!==hover)out.push(n);});}else{const set=new Set();if(hover)adj[hover.id].forEach(id=>set.add(M[id]));if(layout==='force'){N.forEach(n=>{if(n.deg>=10)set.add(n);});}else{N.forEach(n=>{if(n.section==='document')set.add(n);});}set.forEach(n=>{if(n!==hover)out.push(n);});}return out;}
function drawLabels(){const always=[];if(sel)always.push(sel);if(hover&&hover!==sel)always.push(hover);
 if(animating){always.forEach(n=>paintLabel(labelRect(n),1,n===sel));numLayers=1;return;}
 const cands=candidates();const rects=cands.map(labelRect);const aR=always.map(labelRect);
 const conf=rects.map(()=>false);for(let i=0;i<rects.length;i++){for(let j=i+1;j<rects.length;j++){if(over(rects[i],rects[j])){conf[i]=true;conf[j]=true;}}for(let k=0;k<aR.length;k++){if(over(rects[i],aR[k]))conf[i]=true;}}
 const free=[],cf=[];rects.forEach((R,i)=>{(conf[i]?cf:free).push(R);});
 cf.sort((a,b)=>b.w-a.w);const placed=[],layers=[];
 cf.forEach(R=>{let L=0;while(placed.some(p=>p.L===L&&over(p.R,R)))L++;placed.push({R:R,L:L});if(!layers[L])layers[L]=[];layers[L].push(R);});
 numLayers=Math.max(1,layers.length);
 free.forEach(R=>paintLabel(R,1,false));
 if(layers.length){const now=Date.now();const a=layers.length>1?Math.max(0,Math.min(1,(now-labelFadeAt)/FADE)):1;(layers[labelLayer%numLayers]||[]).forEach(R=>paintLabel(R,a,false));}
 always.forEach(n=>paintLabel(labelRect(n),1,n===sel));}
function axis(){if(layout!=='timeline')return;const L=SECS.length;ctx.font='11px -apple-system,Segoe UI,sans-serif';ctx.textBaseline='alphabetic';for(let yr=1990;yr<=2025;yr+=5){const wx=100+(yr-1989)/(2026-1989)*(LW-200);const X=wx*view.k+view.x;if(X<28||X>Wc-8)continue;ctx.strokeStyle='rgba(120,132,170,.16)';ctx.beginPath();ctx.moveTo(X,40);ctx.lineTo(X,Hc-26);ctx.stroke();ctx.fillStyle='rgba(154,166,196,.8)';ctx.fillText(yr,X-12,Hc-12);}
 SECS.forEach((sec,si)=>{const lane=70+si*((LH-150)/(L-1));const Y=lane*view.k+view.y;if(Y<46||Y>Hc-8)return;ctx.fillStyle=COL[sec];ctx.globalAlpha=.9;ctx.fillRect(8,Y-4,8,8);ctx.globalAlpha=1;ctx.fillStyle='rgba(154,166,196,.85)';ctx.fillText(SECLBL[sec],20,Y+3);});}
function edgeCol(s,t,center){if(relHi){return relType(s,t)===relHi?'rgba(120,210,255,.95)':'rgba(120,132,170,.05)';}return center?'rgba(174,196,255,.5)':'rgba(120,132,170,.18)';}
function render(){ctx.setTransform(DPR,0,0,DPR,0,0);ctx.clearRect(0,0,Wc,Hc);axis();
 if(sel){const cid=sel.id;ctx.lineWidth=1.2;
  G.edges.forEach(([s,t])=>{if(!focusSet.has(s)||!focusSet.has(t))return;const a=M[s],b=M[t],center=(s===cid||t===cid);ctx.strokeStyle=edgeCol(s,t,center);ctx.beginPath();ctx.moveTo(sx(a),sy(a));ctx.lineTo(sx(b),sy(b));ctx.stroke();});
  focusSet.forEach(s=>focusSet.forEach(t=>{if(s!==t&&DSET.has(s+'>'+t)&&(s===cid||t===cid)){if(relHi&&relType(s,t)!==relHi)return;arrow(M[s],M[t],'rgba(190,206,255,.85)');}}));
  if(hoverEdge){const[s,t]=hoverEdge;ctx.strokeStyle='rgba(120,210,255,1)';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(sx(M[s]),sy(M[s]));ctx.lineTo(sx(M[t]),sy(M[t]));ctx.stroke();}
  focusSet.forEach(id=>{const n=M[id],r=nodeR(n);ctx.fillStyle=COL[n.section]||'#888';ctx.beginPath();ctx.arc(sx(n),sy(n),r,0,7);ctx.fill();if(n===sel){ctx.strokeStyle='#fff';ctx.lineWidth=2.5;ctx.stroke();}else if(n===hover){ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1.5;ctx.stroke();}});
 }else{const hl=hover;const nb=hl?adj[hl.id]:null;ctx.lineWidth=1;
  G.edges.forEach(([s,t])=>{const a=M[s],b=M[t];if(!a||!b)return;const on=hl&&(s===hl.id||t===hl.id);ctx.strokeStyle=on?'rgba(174,196,255,.7)':'rgba(120,132,170,.08)';ctx.beginPath();ctx.moveTo(sx(a),sy(a));ctx.lineTo(sx(b),sy(b));ctx.stroke();});
  if(hl){OUT[hl.id].forEach(t=>arrow(hl,M[t],'rgba(190,206,255,.85)'));INC[hl.id].forEach(s=>arrow(M[s],hl,'rgba(190,206,255,.5)'));}
  if(hoverEdge){const[s,t]=hoverEdge;ctx.strokeStyle='rgba(120,210,255,1)';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(sx(M[s]),sy(M[s]));ctx.lineTo(sx(M[t]),sy(M[t]));ctx.stroke();arrow(M[s],M[t],'rgba(140,220,255,1)');}
  N.forEach(n=>{const r=nodeR(n);const dim=hl&&n!==hl&&!(nb&&nb.has(n.id));ctx.globalAlpha=dim?0.26:1;ctx.fillStyle=COL[n.section]||'#888';ctx.beginPath();ctx.arc(sx(n),sy(n),r,0,7);ctx.fill();ctx.globalAlpha=1;});}
 drawLabels();}
function stepAnim(){if(animating){let moving=false;N.forEach(n=>{if(n===drag)return;const dx=n.tx-n.x,dy=n.ty-n.y;if(Math.abs(dx)+Math.abs(dy)>0.5){n.x+=dx*0.22;n.y+=dy*0.22;moving=true;}else{n.x=n.tx;n.y=n.ty;}});dirty=true;if(!moving)animating=false;}
 if(!animating&&numLayers>1){const now=Date.now();if(now-labelSwitchAt>=DWELL[dwi]){labelLayer=(labelLayer+1)%numLayers;labelSwitchAt=now;labelFadeAt=now;dirty=true;}else if(now-labelFadeAt<FADE){dirty=true;}}
 if(dirty){render();dirty=false;}requestAnimationFrame(stepAnim);}stepAnim();
function world(e){const r=cv.getBoundingClientRect();return{x:(e.clientX-r.left-view.x)/view.k,y:(e.clientY-r.top-view.y)/view.k};}
function pick(e){const w=world(e);let best=null,bd=22/view.k;const pool=sel?[...focusSet].map(id=>M[id]):N;pool.forEach(n=>{const d=Math.hypot(n.x-w.x,n.y-w.y);if(d<bd){bd=d;best=n;}});return best;}
function segDist(px,py,x1,y1,x2,y2){const dx=x2-x1,dy=y2-y1,l2=dx*dx+dy*dy;let tt=l2?((px-x1)*dx+(py-y1)*dy)/l2:0;tt=Math.max(0,Math.min(1,tt));const cx=x1+tt*dx,cy=y1+tt*dy;return Math.hypot(px-cx,py-cy);}
function edgePick(e){const w=world(e);let best=null,bd=8/view.k;const eds=sel?G.edges.filter(([s,t])=>focusSet.has(s)&&focusSet.has(t)):G.edges;for(const ed of eds){const a=M[ed[0]],b=M[ed[1]];if(!a||!b)continue;const d=segDist(w.x,w.y,a.x,a.y,b.x,b.y);if(d<bd){bd=d;best=ed;}}return best;}
function showNodeTip(n,e){const r=wrap.getBoundingClientRect();tip.innerHTML='<b>'+esc(n.title)+'</b><div class="ty">'+esc(n.type)+'</div><div class="m" style="margin-top:3px">'+esc(n.description||'')+'</div><div class="m" style="margin-top:5px">'+OUT[n.id].size+' references · '+INC[n.id].size+' referenced by</div>';tip.style.display='block';let x=e.clientX-r.left+14,y=e.clientY-r.top+14;if(x+280>Wc)x=e.clientX-r.left-280;if(y+96>Hc)y=e.clientY-r.top-96;tip.style.left=x+'px';tip.style.top=y+'px';}
function showEdgeTip(ed,e){const r=wrap.getBoundingClientRect();const a=M[ed[0]],b=M[ed[1]];tip.innerHTML='<div class="ar">'+esc(a.title)+' &nbsp;—['+esc(relType(ed[0],ed[1]))+']→&nbsp; '+esc(b.title)+'</div><div class="m" style="margin-top:4px">relationship inferred from link direction</div>';tip.style.display='block';let x=e.clientX-r.left+14,y=e.clientY-r.top+14;if(x+300>Wc)x=e.clientX-r.left-300;tip.style.left=x+'px';tip.style.top=y+'px';}
cv.addEventListener('mousemove',e=>{if(drag){if(drag.pan){view.x=e.clientX-drag.psx;view.y=e.clientY-drag.psy;drag.moved=true;dirty=true;}else{const w=world(e);drag.x=w.x;drag.y=w.y;drag.tx=w.x;drag.ty=w.y;drag.moved=true;dirty=true;}tip.style.display='none';return;}
 const h=pick(e);if(h){if(h!==hover){hover=h;hoverEdge=null;dirty=true;}showNodeTip(h,e);cv.style.cursor='pointer';return;}
 if(hover){hover=null;dirty=true;}const ed=edgePick(e);if((ed&&!hoverEdge)||(ed&&hoverEdge&&(ed[0]!==hoverEdge[0]||ed[1]!==hoverEdge[1]))){hoverEdge=ed;dirty=true;}else if(!ed&&hoverEdge){hoverEdge=null;dirty=true;}
 if(ed){showEdgeTip(ed,e);cv.style.cursor='pointer';}else{tip.style.display='none';cv.style.cursor='grab';}});
cv.addEventListener('mouseleave',()=>{tip.style.display='none';if(hover||hoverEdge){hover=null;hoverEdge=null;dirty=true;}});
cv.addEventListener('mousedown',e=>{const n=pick(e);if(n){drag=n;n.vx=n.vy=0;drag.moved=false;}else{drag={pan:true,psx:e.clientX-view.x,psy:e.clientY-view.y,moved:false};}});
window.addEventListener('mouseup',e=>{if(drag){if(drag.pan){if(!drag.moved){const ed=edgePick(e);if(ed){focusUser(ed[1]);}else overviewUser();}}else if(!drag.moved){focusUser(drag.id);}}drag=null;});
function zoomAt(cx,cy,f){const wx=(cx-view.x)/view.k,wy=(cy-view.y)/view.k;view.k=Math.max(0.2,Math.min(2.6,view.k*f));view.x=cx-wx*view.k;view.y=cy-wy*view.k;dirty=true;}
cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.12:1/1.12);},{passive:false});
document.getElementById('zin').onclick=()=>zoomAt(Wc/2,Hc/2,1.2);
document.getElementById('zout').onclick=()=>zoomAt(Wc/2,Hc/2,1/1.2);
document.getElementById('zfit').onclick=()=>{if(sel)(layout==='force'?focusViewRadial():fitFocusSubset());else fitBase();};
document.getElementById('menu').onclick=()=>{side.classList.toggle('open');if(sel)(layout==='force'?focusViewRadial():fitFocusSubset());else fitBase();};
document.getElementById('dclose').onclick=()=>overviewUser();
document.getElementById('bback').onclick=back;document.getElementById('bfwd').onclick=forward;
document.getElementById('bhome').onclick=()=>setLayoutUser('force');
const dwb=document.getElementById('dwell');function updDwell(){dwb.textContent='⏱ '+(DWELL[dwi]/1000).toFixed(1)+'s';}dwb.onclick=()=>{dwi=(dwi+1)%DWELL.length;updDwell();};updDwell();
[...document.querySelectorAll('.bar [data-l]')].forEach(b=>b.onclick=()=>setLayoutUser(b.dataset.l));
window.addEventListener('keydown',e=>{if(e.target&&e.target.tagName==='INPUT')return;if(e.altKey&&e.key==='ArrowLeft'){back();e.preventDefault();}else if(e.altKey&&e.key==='ArrowRight'){forward();e.preventDefault();}else if(e.key==='Escape'){overviewUser();}});
if(window.innerWidth>=920)side.classList.add('open');
const listEl=document.getElementById('list');
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function setActive(id){[...listEl.children].forEach(c=>{if(c.dataset)c.classList.toggle('active',c.dataset.id===id);});}
const order=['root','document','stack','standards','federated','frameworks','research','uk-government','organisations','glossary'];
function buildList(filter){listEl.innerHTML='';order.forEach(sec=>{const items=N.filter(n=>n.section===sec&&(!filter||(n.title+n.description).toLowerCase().includes(filter)));if(!items.length)return;const h=document.createElement('div');h.className='grp';h.textContent=sec;listEl.appendChild(h);items.sort((a,b)=>a.title.localeCompare(b.title)).forEach(n=>{const d=document.createElement('div');d.className='item'+(sel&&sel.id===n.id?' active':'');d.innerHTML='<i class="dot" style="margin-top:5px;background:'+(COL[sec]||'#888')+'"></i><span class="t">'+esc(n.title)+'</span>';d.onclick=()=>{focusUser(n.id);if(window.innerWidth<920)side.classList.remove('open');};d.dataset.id=n.id;listEl.appendChild(d);});});}
document.getElementById('q').addEventListener('input',e=>buildList(e.target.value.toLowerCase()));
function norm(base,href){const dir=base.split('/').slice(0,-1);href.split('/').forEach(p=>{if(p==='..')dir.pop();else if(p!=='.')dir.push(p);});return dir.join('/');}
function md(text,base){const lines=text.split('\n');let html='',i=0;
 function inline(s){s=esc(s).replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,(m,t,u)=>{if(/^https?:|^mailto:/.test(u))return '<a href="'+u+'" target="_blank" rel="noopener">'+t+'</a>';const tg=norm(base,u.split('#')[0]);if(G.nodes[tg])return '<a href="#" data-nav="'+tg+'">'+t+'</a>';return t;});return s;}
 while(i<lines.length){let l=lines[i];
  if(/^#\s/.test(l)){html+='<h1 class="b">'+inline(l.slice(2))+'</h1>';i++;continue;}
  if(/^##\s/.test(l)){html+='<h2 class="b">'+inline(l.slice(3))+'</h2>';i++;continue;}
  if(/^\s*[-*]\s/.test(l)){html+='<ul>';while(i<lines.length&&/^\s*[-*]\s/.test(lines[i])){html+='<li>'+inline(lines[i].replace(/^\s*[-*]\s/,''))+'</li>';i++;}html+='</ul>';continue;}
  if(/^\s*\d+\.\s/.test(l)){html+='<ol>';while(i<lines.length&&/^\s*\d+\.\s/.test(lines[i])){html+='<li>'+inline(lines[i].replace(/^\s*\d+\.\s/,''))+'</li>';i++;}html+='</ol>';continue;}
  if(l.trim()===''){i++;continue;}
  html+='<p>'+inline(l)+'</p>';i++;}
 return html;}
function linkifyGloss(root){if(!root||!GLOSS_RE||typeof document.createTreeWalker!=='function')return;try{const used=new Set();const tw=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);const nodes=[];let c;while(c=tw.nextNode())nodes.push(c);nodes.forEach(tn=>{const pn=tn.parentNode;if(!pn)return;const nm=pn.nodeName;if(nm==='A'||nm==='CODE')return;const text=tn.nodeValue;if(!text||text.length<3)return;GLOSS_RE.lastIndex=0;if(!GLOSS_RE.test(text))return;GLOSS_RE.lastIndex=0;let mt,frag=document.createDocumentFragment(),idx=0,changed=false;while((mt=GLOSS_RE.exec(text))){const term=mt[0],gid=GLOSS[term.toLowerCase()];if(!gid||used.has(gid))continue;used.add(gid);changed=true;if(mt.index>idx)frag.appendChild(document.createTextNode(text.slice(idx,mt.index)));const a=document.createElement('a');a.href='#';a.className='gl';a.setAttribute('data-nav',gid);a.textContent=term;frag.appendChild(a);idx=mt.index+term.length;}if(changed){if(idx<text.length)frag.appendChild(document.createTextNode(text.slice(idx)));pn.replaceChild(frag,tn);}});}catch(e){}}
function relList(ids){return ids.sort((a,b)=>(SECI[M[a].section]-SECI[M[b].section])||G.nodes[a].title.localeCompare(G.nodes[b].title)).map(t=>'<li><span class="dot" style="background:'+(COL[M[t].section]||'#888')+'"></span> <a href="#" data-nav="'+t+'">'+esc(G.nodes[t].title)+'</a></li>').join('');}
function openDetail(id){const n=G.nodes[id];if(!n)return;let h='<span class="badge">'+esc(n.type)+'</span><h2 class="tt">'+esc(n.title)+'</h2><div class="desc">'+esc(n.description)+'</div>';
 if(n.resource)h+='<div class="res">🔗 <a href="'+n.resource+'" target="_blank" rel="noopener">'+esc(n.resource)+'</a></div>';
 h+=md(n.body,id);
 const out=[...OUT[id]],inc=[...INC[id]];
 const types={};out.forEach(t=>{const r=relType(id,t);(types[r]=types[r]||0,types[r]++);});inc.forEach(s=>{const r=relType(s,id);(types[r]=types[r]||0,types[r]++);});
 const tkeys=Object.keys(types);if(tkeys.length)h+='<h2 class="b">Relationship types (inferred)</h2><div class="chips">'+tkeys.map(r=>'<span class="chip" data-rel="'+esc(r)+'">'+esc(r)+' ('+types[r]+')</span>').join('')+'</div>';
 if(out.length)h+='<h2 class="b">References → ('+out.length+')</h2><ul class="rel">'+relList(out)+'</ul>';
 if(inc.length)h+='<h2 class="b">← Referenced by ('+inc.length+')</h2><ul class="rel">'+relList(inc)+'</ul>';
 const db=document.getElementById('dbody');db.innerHTML=h;detail.scrollTop=0;detail.classList.add('open');
 linkifyGloss(db);
 db.querySelectorAll('[data-nav]').forEach(x=>x.onclick=e=>{e.preventDefault();focusUser(x.getAttribute('data-nav'));});
 db.querySelectorAll('.chip').forEach(c=>{c.onmouseenter=()=>{relHi=c.getAttribute('data-rel');dirty=true;};c.onmouseleave=()=>{relHi=null;dirty=true;};});}
buildList('');document.getElementById('count').textContent=paths.length+' concepts · '+G.edges.length+' links';
HIST=[{layout:'force',id:null}];HI=0;updateNav();
</script></body></html>
